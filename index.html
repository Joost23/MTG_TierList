// ── Zoom preview ───────────────────────────────────────
let ptZoomTimer = null;
function ptZoomShow(imageUrl, name, cx, cy) {
  // cx/cy = cursor client coordinates (numbers — safe across async timers & re-renders)
  if (!imageUrl) return;
  const el = document.getElementById('pt-card-zoom');
  if (!el) return;
  const img = el.querySelector('img');
  img.src = imageUrl; img.alt = name || '';
  const vw = window.innerWidth, vh = window.innerHeight;
  const pw = 320, ph = Math.round(320 * 88 / 63);
  // Arena-style: opposite side of cursor, centered on cursor Y
  let left = cx > vw / 2 ? cx - pw - 24 : cx + 24;
  let top  = cy - ph / 2;
  left = Math.max(8, Math.min(left, vw - pw - 8));
  top  = Math.max(8, Math.min(top,  vh - ph - 8));
  el.style.left = left + 'px'; el.style.top = top + 'px';
  el.style.display = 'block';
  requestAnimationFrame(() => el.classList.add('visible'));
}
function ptZoomHide() {
  clearTimeout(ptZoomTimer); ptZoomTimer = null;
  const el = document.getElementById('pt-card-zoom');
  if (!el) return;
  el.classList.remove('visible');
  setTimeout(() => { if (!el.classList.contains('visible')) el.style.display = 'none'; }, 150);
}
function ptZoomHover(e, imageUrl, name, fast) {
  clearTimeout(ptZoomTimer);
  const cx = e.clientX, cy = e.clientY; // capture numbers — survive DOM re-renders
  ptZoomTimer = setTimeout(() => ptZoomShow(imageUrl, name, cx, cy), fast ? 50 : 250);
}

// ── Hand hover preview (fixed-position overlay, X-position detection) ─────
let ptHandPreviewEl = null;

function ptGetOrCreatePreview() {
  if (!ptHandPreviewEl) {
    ptHandPreviewEl = document.createElement('div');
    ptHandPreviewEl.id = 'pt-hand-preview';
    ptHandPreviewEl.style.cssText = 'position:fixed;pointer-events:none;z-index:200;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.8);display:none;opacity:0;transition:opacity 0.1s ease';
    ptHandPreviewEl.innerHTML = '<img style="width:100%;border-radius:8px;display:block">';
    document.body.appendChild(ptHandPreviewEl);
  }
  return ptHandPreviewEl;
}

function ptHideHandPreview() {
  document.querySelectorAll('.pt-hand-card').forEach(c => { c.style.transform = ''; c.style.zIndex = ''; });
}

function ptInitHandHover() {
  const hand = document.querySelector('.pt-hand');
  if (!hand) return;
  hand.addEventListener('pointermove', function(e) {
    if (ptHandDrag || ptDrag) return;
    const cards = Array.from(this.querySelectorAll('.pt-hand-card'));
    if (!cards.length) return;
    // Determine hovered card by actual rendered positions
    let idx = 0;
    for (let i = 0; i < cards.length; i++) {
      const cr = cards[i].getBoundingClientRect();
      if (e.clientX >= cr.left - 2) idx = i;
      else break;
    }
    // Apply Arena-style wave: scale falls off with distance from hovered card
    cards.forEach((c, i) => {
      const dist = Math.abs(i - idx);
      if (dist === 0)      { c.style.transform = 'translateY(-36px) scale(1.9)';  c.style.zIndex = '60'; }
      else if (dist === 1) { c.style.transform = 'translateY(-14px) scale(1.2)';  c.style.zIndex = '50'; }
      else if (dist === 2) { c.style.transform = 'translateY(-4px) scale(1.06)';  c.style.zIndex = '40'; }
      else                 { c.style.transform = '';                               c.style.zIndex = ''; }
    });
  });
  hand.addEventListener('pointerleave', ptHideHandPreview);
}

// ── Battlefield hover: two-stage (glow → zoom after 600ms, mouse only) ────
let ptBfHoverTimer = null;
let ptBfHoveredCard = null;
let ptBfHoverOriginX = 0, ptBfHoverOriginY = 0;

function ptClearBfHover() {
  clearTimeout(ptBfHoverTimer);
  ptBfHoverTimer = null;
  if (ptBfHoveredCard) {
    ptBfHoveredCard.classList.remove('pt-bf-glow', 'pt-bf-zoomed');
    ptBfHoveredCard = null;
  }
}

function ptInitBfHover() {
  const canvas = document.getElementById('pt-bf-canvas');
  if (!canvas) return;
  canvas.addEventListener('pointerover', function(e) {
    if (e.pointerType !== 'mouse') return;
    if (ptDrag || ptPan || ptPanPending) return;
    const card = e.target.closest('.pt-bf-card');
    if (!card || card === ptBfHoveredCard) return;
    ptClearBfHover();
    ptBfHoveredCard = card;
    ptBfHoverOriginX = e.clientX;
    ptBfHoverOriginY = e.clientY;
    card.classList.add('pt-bf-glow');
    ptBfHoverTimer = setTimeout(() => {
      if (ptBfHoveredCard === card && !ptDrag && !ptPan) card.classList.add('pt-bf-zoomed');
    }, 600);
  });
  canvas.addEventListener('pointermove', function(e) {
    if (e.pointerType !== 'mouse' || !ptBfHoveredCard) return;
    const card = e.target.closest('.pt-bf-card');
    if (card !== ptBfHoveredCard) return;
    const dx = e.clientX - ptBfHoverOriginX, dy = e.clientY - ptBfHoverOriginY;
    if (Math.hypot(dx, dy) > 5) {
      ptBfHoverOriginX = e.clientX; ptBfHoverOriginY = e.clientY;
      clearTimeout(ptBfHoverTimer);
      ptBfHoveredCard.classList.remove('pt-bf-zoomed');
      ptBfHoverTimer = setTimeout(() => {
        if (ptBfHoveredCard === card && !ptDrag && !ptPan) card.classList.add('pt-bf-zoomed');
      }, 600);
    }
  });
  canvas.addEventListener('pointerout', function(e) {
    if (e.pointerType !== 'mouse') return;
    const card = e.target.closest('.pt-bf-card');
    if (card && card === ptBfHoveredCard && !card.contains(e.relatedTarget)) ptClearBfHover();
  });
}

// ── Token creation panel ───────────────────────────────

  const TOKEN_COLORS = { W:'#C8A84B', U:'#1070C8', B:'#4B4B4B', R:'#D0392A', G:'#1A7A3C', C:'#888' };
  return `<div class="pt-token-panel" onclick="state.playtestTokenPanel=false;render()">
    <div class="pt-token-panel-inner" onclick="event.stopPropagation()">
      <div class="pt-token-panel-header">
        <span style="font-weight:600;font-size:15px">Create Token</span>

      </div>

              ${tk.imageUrl
                ? `<img src="${escHtml(tk.imageUrl)}" loading="lazy" alt="${escHtml(tk.name)}">`
                : `<div class="pt-token-tile-placeholder">${escHtml(tk.name)}</div>`}
              <div class="pt-token-tile-label">${escHtml(tk.name)}${tk.power!=null?`<br><span style="color:var(--text-muted)">${tk.power}/${tk.toughness}</span>`:''}</div>
            </div>`).join('')}
        </div>` : `<div style="padding:20px 16px;font-size:13px;color:var(--text-muted);text-align:center">No tokens found — view the deck's Images tab first to load card data.</div>`}
        <div class="pt-token-custom">
          <div class="pt-token-custom-title">Custom Token</div>
          <div class="pt-token-custom-row">

            <input style="width:64px;font-size:12px" placeholder="P/T" value="${escHtml(draft.pt)}" oninput="state.ptTokenDraft.pt=this.value">

            </select>
          </div>
          <button class="btn-primary" style="width:100%;font-size:13px;padding:9px" onclick="ptCreateCustomToken()" ${!draft.name.trim()?'disabled':''}>+ Create ${qty > 1 ? qty + '× ' : ''}${escHtml(draft.name || 'Token')}</button>
        </div>

  </div>`;
}

async function ptCreateTokenById(scryfallId, qty = 1) {
  const tokenData = tokenDataCache[scryfallId];
  if (tokenData) await ptCreateToken(tokenData, qty);
}

async function ptCreateToken(tokenData, qty = 1) {
  const uid = state.currentUser?.uid;
  const player = state.playtestGame?.players?.[uid];
  if (!player) return;
  const existingBf = [...(player.battlefield || [])];
  const newCards = [];
  for (let i = 0; i < qty; i++) {
    const pos = ptDefaultPos([...existingBf, ...newCards]);
    newCards.push({
      cardId: genId(), name: tokenData.name,
      imageUrl: tokenData.imageUrl || null,
      zone: 'battlefield', tapped: false, counters: 0,
      isCommander: false, isToken: true,
      power: tokenData.power || null, toughness: tokenData.toughness || null,
      x: pos.x, y: pos.y,
    });
  }
  await ptPub({ [`players.${uid}.battlefield`]: [...existingBf, ...newCards] });
  state.playtestTokenPanel = false;
  render();
}

async function ptCreateCustomToken() {
  const draft = state.ptTokenDraft || { name: '', pt: '', color: 'G' };
  if (!draft.name.trim()) return;
  const [power, toughness] = (draft.pt || '').split('/').map(s => s.trim());
  const tokenData = {
    name: draft.name.trim(), imageUrl: null,
    power: power || null, toughness: toughness || null,
    typeLine: `Token${power ? ' Creature' : ''}`, colors: [draft.color],
  };
  await ptCreateToken(tokenData, state.ptTokenQty || 1);
  state.ptTokenDraft = { name: '', pt: '', color: 'G' };
  state.ptTokenQty = 1;
}

// ── Drag-and-drop: pointer events ─────────────────────
let ptHandDrag = null;
let ptHandDragGhost = null;
let ptCmdrDrag = null;
let ptCmdrDragGhost = null;

function ptCmdrPointerDown(e) {
  if (e.button !== 0 && e.pointerType !== 'touch') return;
  const uid = state.currentUser?.uid;
  const cmdrs = state.playtestGame?.players?.[uid]?.commandZone || [];
  if (!cmdrs.length) return;
  ptCmdrDrag = { startX: e.clientX, startY: e.clientY, moved: false, card: cmdrs[0] };
}
// Track whether last cmdr pointerdown became a drag, to suppress the click
let ptCmdrWasDrag = false;
function ptCmdrClick(e) {
  if (ptCmdrWasDrag) { ptCmdrWasDrag = false; return; }
  state.ptCmdrMenu = { x: e.clientX, y: e.clientY };
  render();
}

function ptHandPointerDown(e, cardId) {
  if (e.button !== 0 && e.pointerType !== 'touch') return;
  const uid = state.currentUser?.uid;
  const viewUid = state.playtestViewUid || uid;
  if (viewUid !== uid) return;
  e.preventDefault();
  e.stopPropagation();
  try { e.target.setPointerCapture(e.pointerId); } catch(_) {}
  ptHideHandPreview();
  ptHandDrag = { cardId, startX: e.clientX, startY: e.clientY, moved: false };
}

function applyScale(factor, originX, originY) {
  const newScale = Math.max(0.25, Math.min(4, ptScale * factor));
  ptPanX = originX - ((originX - ptPanX) / ptScale) * newScale;
  ptPanY = originY - ((originY - ptPanY) / ptScale) * newScale;
  ptScale = newScale;
  const canvas = document.getElementById('pt-bf-canvas');
  if (canvas) canvas.style.transform = `translate(${ptPanX}px,${ptPanY}px) scale(${ptScale})`;
}

function ptBfPanStart(e) {
  if (e.button !== 0 && e.pointerType !== 'touch') return;
  if (e.pointerType === 'touch') {
    ptTouches.set(e.pointerId, {x: e.clientX, y: e.clientY});
    if (ptTouches.size >= 2) {
      // Two fingers down — switch to pinch
      ptPan = null;
      document.getElementById('pt-battlefield')?.classList.remove('pt-panning');
      const pts = [...ptTouches.values()];
      const midX = (pts[0].x + pts[1].x) / 2;
      const midY = (pts[0].y + pts[1].y) / 2;
      ptPinch = {
        startDist: Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y),
        startScale: ptScale,
        canvasX: (midX - ptPanX) / ptScale,
        canvasY: (midY - ptPanY) / ptScale,
      };
      return;
    }
    // Single touch on empty space — pan
    if (!e.target.closest('.pt-bf-card,.pt-zone-btn') && !ptDrag && !ptHandDrag) {
      ptPan = { startX: e.clientX, startY: e.clientY, origX: ptPanX, origY: ptPanY };
      document.getElementById('pt-battlefield')?.classList.add('pt-panning');
    }
    return;
  }
  // Mouse: record pan candidate — commit only once pointer moves
  if (e.target.closest('.pt-bf-card,.pt-zone-btn,.pt-bf-empty')) return;
  if (ptDrag || ptHandDrag) return;
  ptPanPending = { startX: e.clientX, startY: e.clientY, origX: ptPanX, origY: ptPanY };
}

function ptPointerDown(e, cardId) {
  ptClearBfHover(); // dismiss glow/zoom when grabbing a card
  ptPanPending = null; // cancel any pending pan — user is interacting with a card
  if (e.button === 2) { ptOpenMenu(cardId, 'battlefield', e); return; }
  if (e.button !== 0 && e.pointerType !== 'touch') return;
  const uid = state.currentUser?.uid;
  const viewUid = state.playtestViewUid || uid;
  if (viewUid !== uid) return;
  const player = state.playtestGame?.players?.[uid];
  const card = (player?.battlefield || []).find(c => c.cardId === cardId);
  if (!card) return;
  e.preventDefault();
  e.stopPropagation();
  try { e.target.setPointerCapture(e.pointerId); } catch(_) {}
  const longPressTimer = setTimeout(() => {
    if (ptDrag && !ptDrag.moved) {
      ptDrag.isLongPress = true;
      ptOpenMenu(cardId, 'battlefield', { clientX: ptDrag.startX, clientY: ptDrag.startY });
    }
  }, 400);
  ptDrag = {
    cardId,
    startX: e.clientX,
    startY: e.clientY,
    origCardX: card.x ?? 20,
    origCardY: card.y ?? 20,
    moved: false,
    longPressTimer,
  };
}

document.addEventListener('pointermove', function(e) {
  // Commit pending mouse pan once pointer moves past threshold
  if (ptPanPending && e.pointerType !== 'touch') {
    const dx = e.clientX - ptPanPending.startX, dy = e.clientY - ptPanPending.startY;
    if (Math.hypot(dx, dy) > 4) {
      ptPan = ptPanPending;
      ptPanPending = null;
      document.getElementById('pt-battlefield')?.classList.add('pt-panning');
    }
  }
  // Pinch zoom (touch)
  if (ptPinch && e.pointerType === 'touch' && ptTouches.has(e.pointerId)) {
    ptTouches.set(e.pointerId, {x: e.clientX, y: e.clientY});
    if (ptTouches.size >= 2) {
      const pts = [...ptTouches.values()];
      const newDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
      const midX = (pts[0].x + pts[1].x) / 2;
      const midY = (pts[0].y + pts[1].y) / 2;
      const newScale = Math.max(0.25, Math.min(4, ptPinch.startScale * (newDist / ptPinch.startDist)));
      ptPanX = midX - ptPinch.canvasX * newScale;
      ptPanY = midY - ptPinch.canvasY * newScale;
      ptScale = newScale;
      const canvas = document.getElementById('pt-bf-canvas');
      if (canvas) canvas.style.transform = `translate(${ptPanX}px,${ptPanY}px) scale(${ptScale})`;
    }
    return;
  }
  // Battlefield pan
  if (ptPan) {
    if (e.pointerType === 'touch') ptTouches.set(e.pointerId, {x: e.clientX, y: e.clientY});
    ptPanX = ptPan.origX + (e.clientX - ptPan.startX);
    ptPanY = ptPan.origY + (e.clientY - ptPan.startY);
    const canvas = document.getElementById('pt-bf-canvas');
    if (canvas) canvas.style.transform = `translate(${ptPanX}px,${ptPanY}px) scale(${ptScale})`;
    return;
  }
  // Commander zone → battlefield drag
  if (ptCmdrDrag) {
    const dx = e.clientX - ptCmdrDrag.startX;
    const dy = e.clientY - ptCmdrDrag.startY;
    if (!ptCmdrDrag.moved && Math.hypot(dx, dy) < 6) return;
    if (!ptCmdrDrag.moved) {
      ptCmdrDrag.moved = true;
      state.ptCmdrMenu = null;
      const card = ptCmdrDrag.card;
      const ghost = document.createElement('div');
      ghost.style.cssText = 'position:fixed;width:80px;border-radius:6px;pointer-events:none;z-index:1000;opacity:0.85;transform:translate(-50%,-60%) scale(1.1);box-shadow:0 8px 24px rgba(0,0,0,0.5);transition:none';
      if (card?.imageUrl) {
        ghost.innerHTML = `<img src="${card.imageUrl}" style="width:72px;border-radius:5px;display:block">`;
      } else if (card) {
        ghost.style.cssText += ';background:#1a1535;height:100px;border:1px solid #555;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;text-align:center;padding:4px;box-sizing:border-box';
        ghost.textContent = card.name;
      }
      document.body.appendChild(ghost);
      ptCmdrDragGhost = ghost;
    }
    if (ptCmdrDragGhost) {
      ptCmdrDragGhost.style.left = e.clientX + 'px';
      ptCmdrDragGhost.style.top = e.clientY + 'px';
    }
    // Highlight battlefield
    const bfEl2 = document.getElementById('pt-battlefield');
    if (bfEl2) {
      const r2 = bfEl2.getBoundingClientRect();
      bfEl2.classList.toggle('pt-drop-active', e.clientX >= r2.left && e.clientX <= r2.right && e.clientY >= r2.top && e.clientY <= r2.bottom);
    }
    return;
  }
  // Hand → battlefield drag
  if (ptHandDrag) {
    const dx = e.clientX - ptHandDrag.startX;
    const dy = e.clientY - ptHandDrag.startY;
    if (!ptHandDrag.moved && Math.hypot(dx, dy) < 6) return;
    if (!ptHandDrag.moved) {
      ptHandDrag.moved = true;
      state.playtestCardMenu = null;
      const priv = state.playtestPrivate;
      const card = (priv?.hand || []).find(c => c.cardId === ptHandDrag.cardId);
      const ghost = document.createElement('div');
      ghost.style.cssText = 'position:fixed;width:80px;border-radius:6px;pointer-events:none;z-index:1000;opacity:0.85;transform:translate(-50%,-60%) scale(1.1);box-shadow:0 8px 24px rgba(0,0,0,0.5);transition:none';
      if (card?.imageUrl) {
        ghost.innerHTML = `<img src="${card.imageUrl}" style="width:72px;border-radius:5px;display:block">`;
      } else if (card) {
        ghost.style.cssText += ';background:#1a1535;height:100px;border:1px solid #555;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;text-align:center;padding:4px;box-sizing:border-box';
        ghost.textContent = card.name;
      }
      document.body.appendChild(ghost);
      ptHandDragGhost = ghost;
      const srcEl = document.querySelector(`[data-hand-card-id="${ptHandDrag.cardId}"]`);
      if (srcEl) srcEl.classList.add('pt-dragging-src');
    }
    if (ptHandDragGhost) {
      let ghostX = e.clientX, ghostY = e.clientY;
      if (state.snapToGrid) {
        const canvasEl = document.getElementById('pt-bf-canvas');
        if (canvasEl) {
          const cr = canvasEl.getBoundingClientRect();
          const cw = ptCardW();
          const ch = Math.round(cw * 88 / 63);
          let sx = (e.clientX - cr.left) / ptScale - cw / 2;
          let sy = (e.clientY - cr.top)  / ptScale - ch / 2;
          sx = Math.round(sx / cw) * cw;
          sy = Math.round(sy / cw) * cw;
          ghostX = cr.left + (sx + cw / 2) * ptScale;
          ghostY = cr.top  + (sy + ch / 2) * ptScale;
        }
      }
      ptHandDragGhost.style.left = ghostX + 'px';
      ptHandDragGhost.style.top = ghostY + 'px';
    }
    // Reorder indicator within hand
    const handEl = document.querySelector('.pt-hand');
    document.querySelectorAll('.pt-hand-reorder-target,.pt-hand-reorder-end').forEach(c => c.classList.remove('pt-hand-reorder-target','pt-hand-reorder-end'));
    if (handEl) {
      const hr = handEl.getBoundingClientRect();
      const overHand = e.clientY >= hr.top - 30 && e.clientY <= hr.bottom + 30
                    && e.clientX >= hr.left && e.clientX <= hr.right + 40;
      if (overHand) {
        const handCards = Array.from(handEl.querySelectorAll('.pt-hand-card'));
        let insertBefore = null; // null = end
        let marked = false;
        for (const hc of handCards) {
          if (hc.dataset.handCardId === ptHandDrag.cardId) continue;
          const cr = hc.getBoundingClientRect();
          if (e.clientX < cr.left + cr.width / 2) {
            insertBefore = parseInt(hc.dataset.handIdx);
            hc.classList.add('pt-hand-reorder-target');
            marked = true;
            break;
          }
        }
        if (!marked) {
          // Insert at end — mark last non-dragged card with right indicator
          const last = [...handCards].reverse().find(c => c.dataset.handCardId !== ptHandDrag.cardId);
          if (last) last.classList.add('pt-hand-reorder-end');
        }
        ptHandDrag.insertBefore = insertBefore;
      } else {
        ptHandDrag.insertBefore = undefined; // not over hand = bf/zone drop
      }
    }
    // Highlight battlefield
    const bfEl2 = document.getElementById('pt-battlefield');
    if (bfEl2) {
      const r2 = bfEl2.getBoundingClientRect();
      bfEl2.classList.toggle('pt-drop-active', e.clientX >= r2.left && e.clientX <= r2.right && e.clientY >= r2.top && e.clientY <= r2.bottom);
    }
    // Highlight zone buttons
    document.querySelectorAll('[data-pt-drop-zone]').forEach(btn => {
      const r = btn.getBoundingClientRect();
      btn.classList.toggle('pt-drop-hover', e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom);
    });
    return;
  }

  // Battlefield drag
  if (!ptDrag) return;
  const dx = e.clientX - ptDrag.startX;
  const dy = e.clientY - ptDrag.startY;
  if (!ptDrag.moved && Math.hypot(dx, dy) < 6) return;
  if (!ptDrag.moved) {
    ptDrag.moved = true;
    if (ptDrag.longPressTimer) { clearTimeout(ptDrag.longPressTimer); ptDrag.longPressTimer = null; }
    state.playtestCardMenu = null;
    ptHideHandPreview(); // clear any wave state on hand cards
  }
  // Highlight zone buttons for bf drag
  document.querySelectorAll('[data-pt-drop-zone]').forEach(btn => {
    const r = btn.getBoundingClientRect();
    btn.classList.toggle('pt-drop-hover', e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom);
  });
  // Hand insert indicator while dragging bf card over hand
  const handElBf = document.querySelector('.pt-hand');
  document.querySelectorAll('.pt-hand-reorder-target,.pt-hand-reorder-end').forEach(c => c.classList.remove('pt-hand-reorder-target','pt-hand-reorder-end'));
  if (handElBf && ptDrag.moved) {
    const hr = handElBf.getBoundingClientRect();
    const overHand = e.clientY >= hr.top - 30 && e.clientY <= hr.bottom + 30
                  && e.clientX >= hr.left && e.clientX <= hr.right + 40;
    if (overHand) {
      const handCards = Array.from(handElBf.querySelectorAll('.pt-hand-card'));
      let insertBefore = null;
      let marked = false;
      for (const hc of handCards) {
        const cr = hc.getBoundingClientRect();
        if (e.clientX < cr.left + cr.width / 2) {
          insertBefore = parseInt(hc.dataset.handIdx);
          hc.classList.add('pt-hand-reorder-target');
          marked = true;
          break;
        }
      }
      if (!marked) {
        const last = [...handCards].reverse()[0];
        if (last) last.classList.add('pt-hand-reorder-end');
      }
      ptDrag.handInsertBefore = insertBefore;
    } else {
      ptDrag.handInsertBefore = undefined;
    }
  }
  let newX = Math.max(0, ptDrag.origCardX + dx / ptScale);
  let newY = Math.max(0, ptDrag.origCardY + dy / ptScale);
  if (state.snapToGrid) {
    const cw = ptCardW();
    newX = Math.round(newX / cw) * cw;
    newY = Math.round(newY / cw) * cw;
  }
  const el = document.querySelector(`[data-card-id="${ptDrag.cardId}"]`);
  if (el) {
    el.classList.add('pt-dragging-src');
    el.style.left = newX + 'px';
    el.style.top = newY + 'px';
  }
});

function ptCleanupTouch(pointerId) {
  ptTouches.delete(pointerId);
  if (ptTouches.size < 2) ptPinch = null;
  if (ptTouches.size === 0) {
    ptPan = null;
    document.getElementById('pt-battlefield')?.classList.remove('pt-panning');
  }
}

document.addEventListener('pointercancel', function(e) {
  ptPanPending = null;
  if (e.pointerType === 'touch') ptCleanupTouch(e.pointerId);
});

document.addEventListener('pointerup', async function(e) {
  // Touch cleanup
  if (e.pointerType === 'touch') {
    const wasPinching = !!ptPinch;
    ptCleanupTouch(e.pointerId);
    if (wasPinching) return; // pinch-end, not a tap
  }
  // Battlefield pan end
  ptPanPending = null;
  if (ptPan && e.pointerType !== 'touch') {
    ptPan = null;
    document.getElementById('pt-battlefield')?.classList.remove('pt-panning');
    return;
  }
  // Commander zone → battlefield drop
  if (ptCmdrDrag) {
    const drag = ptCmdrDrag;
    ptCmdrDrag = null;
    if (ptCmdrDragGhost) { document.body.removeChild(ptCmdrDragGhost); ptCmdrDragGhost = null; }
    document.getElementById('pt-battlefield')?.classList.remove('pt-drop-active');
    if (!drag.moved) return; // let onclick handle it
    ptCmdrWasDrag = true;
    const bfEl = document.getElementById('pt-battlefield');
    if (bfEl && drag.card) {
      const bfRect = bfEl.getBoundingClientRect();
      if (e.clientX >= bfRect.left && e.clientX <= bfRect.right &&
          e.clientY >= bfRect.top && e.clientY <= bfRect.bottom) {
        const canvasEl = document.getElementById('pt-bf-canvas');
        const canvasRect = canvasEl ? canvasEl.getBoundingClientRect() : bfRect;
        const CARD_W = ptCardW(), CARD_H = Math.round(CARD_W * 88 / 63);
        let x = Math.max(0, (e.clientX - canvasRect.left) / ptScale - CARD_W / 2);
        let y = Math.max(0, (e.clientY - canvasRect.top)  / ptScale - CARD_H / 2);
        if (state.snapToGrid) { x = Math.round(x/ptCardW())*ptCardW(); y = Math.round(y/ptCardW())*ptCardW(); }
        await ptMoveCard(drag.card.cardId, 'commandZone', 'battlefield', { x, y });
        return;
      }
    }
    return;
  }
  // Hand → drop
  if (ptHandDrag) {
    const drag = ptHandDrag;
    ptHandDrag = null;
    if (ptHandDragGhost) { document.body.removeChild(ptHandDragGhost); ptHandDragGhost = null; }
    const srcEl = document.querySelector(`[data-hand-card-id="${drag.cardId}"]`);
    if (srcEl) srcEl.classList.remove('pt-dragging-src');
    document.getElementById('pt-battlefield')?.classList.remove('pt-drop-active');
    document.querySelectorAll('[data-pt-drop-zone]').forEach(b => b.classList.remove('pt-drop-hover'));
    document.querySelectorAll('.pt-hand-reorder-target,.pt-hand-reorder-end').forEach(c => c.classList.remove('pt-hand-reorder-target','pt-hand-reorder-end'));
    if (!drag.moved) {
      ptOpenMenu(drag.cardId, 'hand', e);
      return;
    }
    // Check zone button drop first
    const zoneBtn = document.elementFromPoint(e.clientX, e.clientY)?.closest('[data-pt-drop-zone]');
    if (zoneBtn) {
      await ptMoveCard(drag.cardId, 'hand', zoneBtn.dataset.ptDropZone);
      return;
    }
    const bfEl = document.getElementById('pt-battlefield');
    if (bfEl) {
      const bfRect = bfEl.getBoundingClientRect();
      if (e.clientX >= bfRect.left && e.clientX <= bfRect.right &&
          e.clientY >= bfRect.top && e.clientY <= bfRect.bottom) {
        const canvasEl = document.getElementById('pt-bf-canvas');
        const canvasRect = canvasEl ? canvasEl.getBoundingClientRect() : bfRect;
        const CARD_W = ptCardW(), CARD_H = Math.round(CARD_W * 88 / 63);
        let x = Math.max(0, (e.clientX - canvasRect.left) / ptScale - CARD_W / 2);
        let y = Math.max(0, (e.clientY - canvasRect.top)  / ptScale - CARD_H / 2);
        if (state.snapToGrid) { x = Math.round(x/ptCardW())*ptCardW(); y = Math.round(y/ptCardW())*ptCardW(); }
        await ptPlayCardAt(drag.cardId, x, y);
        return;
      }
    }
    // Reorder within hand
    if (drag.insertBefore !== undefined) {
      const priv = state.playtestPrivate;
      if (priv) {
        const hand = [...(priv.hand || [])];
        const fromIdx = hand.findIndex(c => c.cardId === drag.cardId);
        if (fromIdx !== -1) {
          const [card] = hand.splice(fromIdx, 1);
          let toIdx = drag.insertBefore !== null
            ? (drag.insertBefore > fromIdx ? drag.insertBefore - 1 : drag.insertBefore)
            : hand.length;
          hand.splice(toIdx, 0, card);
          await ptPriv({ ...priv, hand });
        }
      }
    }
    return;
  }

  // Battlefield drag
  if (!ptDrag) return;
  const drag = ptDrag;
  ptDrag = null;
  document.querySelectorAll('[data-pt-drop-zone]').forEach(b => b.classList.remove('pt-drop-hover'));
  document.querySelectorAll('.pt-hand-reorder-target,.pt-hand-reorder-end').forEach(c => c.classList.remove('pt-hand-reorder-target','pt-hand-reorder-end'));
  if (!drag.moved) {
    if (drag.longPressTimer) clearTimeout(drag.longPressTimer);
    if (!drag.isLongPress) await ptTapCard(drag.cardId);
    // long-press already opened menu via timer
    return;
  }
  // Check zone button drop
  const zoneBtn2 = document.elementFromPoint(e.clientX, e.clientY)?.closest('[data-pt-drop-zone]');
  if (zoneBtn2) {
    const el2 = document.querySelector(`[data-card-id="${drag.cardId}"]`);
    if (el2) el2.classList.remove('pt-dragging-src');
    await ptMoveCard(drag.cardId, 'battlefield', zoneBtn2.dataset.ptDropZone);
    return;
  }
  // Check if dropped on hand zone → move to hand
  const handEl = document.querySelector('.pt-hand');
  if (handEl) {
    const hr = handEl.getBoundingClientRect();
    if (e.clientX >= hr.left && e.clientX <= hr.right && e.clientY >= hr.top && e.clientY <= hr.bottom) {
      const el2 = document.querySelector(`[data-card-id="${drag.cardId}"]`);
      if (el2) el2.classList.remove('pt-dragging-src');
      await ptMoveCard(drag.cardId, 'battlefield', 'hand', { insertBefore: drag.handInsertBefore });
      return;
    }
  }

  const dx = e.clientX - drag.startX;
  const dy = e.clientY - drag.startY;
  let newX = Math.max(0, drag.origCardX + dx);
  let newY = Math.max(0, drag.origCardY + dy);
  if (state.snapToGrid) {
    newX = Math.round(newX / ptCardW()) * ptCardW();
    newY = Math.round(newY / ptCardW()) * ptCardW();
  }
  const uid = state.currentUser?.uid;
  const player = state.playtestGame?.players?.[uid];
  if (!player) return;
  const newBf = (player.battlefield || []).map(c =>
    c.cardId === drag.cardId ? { ...c, x: newX, y: newY } : c
  );
  // Snap element to final position; briefly disable pointer-events so hover-zoom doesn't stick
  const el = document.querySelector(`[data-card-id="${drag.cardId}"]`);
  if (el) {
    el.classList.remove('pt-dragging-src');
    el.style.left = newX + 'px';
    el.style.top = newY + 'px';
    el.style.pointerEvents = 'none';
    setTimeout(() => { el.style.pointerEvents = ''; }, 300);
  }
  // Optimistic state update, then Firestore
  if (state.playtestGame?.players?.[uid]) {
    state.playtestGame.players[uid].battlefield = newBf;
  }
  await ptPub({ [`players.${uid}.battlefield`]: newBf }).catch(console.error);
});

async function ptPlayCardAt(cardId, x, y) {
  const uid = state.currentUser?.uid;
  const player = state.playtestGame?.players?.[uid];
  const priv = state.playtestPrivate;
  if (!player || !priv) return;
  const hand = [...(priv.hand || [])];
  const idx = hand.findIndex(c => c.cardId === cardId);
  if (idx === -1) return;
  const [card] = hand.splice(idx, 1);
  const typeLine = (scryfallCache[scryfallKey(card.name)]?.typeLine || '').toLowerCase();
  const isLand = typeLine.includes('land');
  if (isLand) {
    // Lands go directly to the dropped position — no stack
    const battlefield = [...(player.battlefield || []), { ...card, zone: 'battlefield', tapped: false, x, y }];
    if (state.playtestPrivate) state.playtestPrivate = { ...state.playtestPrivate, hand };
    if (state.playtestGame?.players?.[uid]) state.playtestGame.players[uid].battlefield = battlefield;
    render();
    await ptPriv({ ...priv, hand });
    await ptPub({ [`players.${uid}.battlefield`]: battlefield });
  } else {
    ptSpendManaForCost(scryfallCache[scryfallKey(card.name)]?.manaCost || '');
    const priorityEnabled = state.playtestGame?.priorityEnabled !== false;
    if (!priorityEnabled) {
      // No stack — play directly to the drop position
      const battlefield = [...(player.battlefield || []), { ...card, zone: 'battlefield', tapped: false, counters: 0, x, y }];
      if (state.playtestPrivate) state.playtestPrivate = { ...state.playtestPrivate, hand };
      if (state.playtestGame?.players?.[uid]) state.playtestGame.players[uid].battlefield = battlefield;
      render();
      await ptPriv({ ...priv, hand });
      await ptPub({ [`players.${uid}.battlefield`]: battlefield });
    } else {
      // Non-lands go to the stack with drop position saved for resolution
      const session = state.playtestGame;
      const stackItem = { cardId: card.cardId, name: card.name, imageUrl: card.imageUrl || null,
        casterId: uid, casterName: player.displayName || 'Player', fromZone: 'hand',
        dropX: x, dropY: y,
        addedAt: new Date().toISOString() };
      const newStack = [stackItem, ...(session?.stack || [])];
      const activePlayers = Object.keys(session?.players || {}).filter(p => !session?.players[p].conceded);
      const myIdx = activePlayers.indexOf(uid);
      const nextPriority = activePlayers.length > 1 ? activePlayers[(myIdx + 1) % activePlayers.length] : uid;
      const newPriority = state.ptHoldPriority ? uid : nextPriority;
      const newPassed  = state.ptHoldPriority ? [] : [uid];
      if (state.playtestGame) state.playtestGame = { ...state.playtestGame, stack: newStack, priority: newPriority, passed: newPassed };
      if (state.playtestPrivate) state.playtestPrivate = { ...state.playtestPrivate, hand };
      state.ptCastToast = card.name;
      setTimeout(() => { if (state.ptCastToast === card.name) { state.ptCastToast = null; render(); } }, 1200);
      render();
      await ptPriv({ ...priv, hand });
      await ptPub({ stack: newStack, priority: newPriority, passed: newPassed });
    }
  }
}

function getStrategyTag(deck) {
  const text = ((deck.notes || '') + ' ' + (deck.commander || '') + ' ' + (deck.theme || '')).toLowerCase();
  for (const tag of STRATEGY_TAGS) {
    if (tag.keywords.some(kw => text.includes(kw))) return tag;
  }
  return { key: 'goodstuff', label: 'Goodstuff', emoji: '✨' };
}

function getMetaColors() {
  const COLOR_NAMES = { W: 'White', U: 'Blue', B: 'Black', R: 'Red', G: 'Green' };
  return ['W','U','B','R','G'].map(c => {
    const decks = state.decks.filter(d => (d.colors || '').includes(c));
    const wins = decks.reduce((s, d) => s + (d.games||[]).filter(g => g.result==='win').length, 0);
    const games = decks.reduce((s, d) => s + (d.games||[]).length, 0);
    return { c, name: COLOR_NAMES[c], deckCount: decks.length, wins, games, winRate: games > 0 ? Math.round(wins/games*100) : null };
  });
}

function getHeadToHead() {
  const players = [...new Set(state.decks.map(d => d.player))];
  const matrix = {};
  players.forEach(p1 => {
    matrix[p1] = {};
    players.forEach(p2 => {
      if (p1 === p2) return;
      let wins = 0, losses = 0;
      state.decks.filter(d => d.player === p1).forEach(deck => {
        (deck.games||[]).forEach(g => {
          const opp = state.decks.find(d => d.id === g.opponentId);
          if (opp?.player !== p2) return;
          if (g.result === 'win') wins++; else losses++;
        });
      });
      matrix[p1][p2] = { wins, losses, total: wins + losses };
    });
  });
  return { matrix, players };
}

function getTierDistribution() {
  const players = [...new Set(state.decks.map(d => d.player))];
  return players.map(p => {
    const decks = state.decks.filter(d => d.player === p);
    const tiers = {};
    TIERS.forEach(t => { tiers[t.label] = decks.filter(d => getTier(getOverall(d)) === t.label).length; });
    return { player: p, tiers };
  });
}

function getStrategyBreakdown() {
  const map = {};
  state.decks.forEach(deck => {
    const tag = getStrategyTag(deck);
    if (!map[tag.key]) map[tag.key] = { ...tag, count: 0, wins: 0, games: 0 };
    map[tag.key].count++;
    map[tag.key].wins  += (deck.games||[]).filter(g => g.result==='win').length;
    map[tag.key].games += (deck.games||[]).length;
  });
  return Object.values(map).sort((a, b) => b.count - a.count);
}

function renderMetaTab() {

  const { matrix, players } = getHeadToHead();
  const tierDist   = getTierDistribution();
  const strategies = getStrategyBreakdown();
  const totalGames = getRecentGames(10000).length;

  const COLOR_BG = { W:'#C8A84B', U:'#1070C8', B:'#6B6B6B', R:'#D0392A', G:'#1A7A3C' };

          </div>
          <span style="font-size:12px;color:var(--text-secondary);width:70px;text-align:right;flex-shrink:0">${deckCount} decks · ${pct}%</span>
          <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);width:32px;text-align:right;flex-shrink:0">${winRate !== null ? winRate+'%' : '—'}</span>
        </div>`;
      }).join('')}

    </div>`;

  // ── Head-to-Head ────────────────────────────────────────
  const h2hSection = players.length >= 2 ? `
    <div class="dash-section-title">Head-to-Head</div>
    <div class="dash-card" style="padding:16px 18px">
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:280px">
          <thead><tr>
            <th style="text-align:left;padding:6px 10px;color:var(--text-muted);font-size:11px;font-weight:500;border-bottom:1px solid var(--border)">Player</th>
            ${players.map(p => { const pc = playerColor(p); return `<th style="text-align:center;padding:6px 10px;color:${pc.color};font-size:12px;font-weight:600;border-bottom:1px solid var(--border)">${escHtml(p)}</th>`; }).join('')}
          </tr></thead>
          <tbody>
            ${players.map(p1 => {
              const pc = playerColor(p1);
              return `<tr>
                <td style="padding:10px;border-bottom:1px solid var(--border)">
                  <div style="display:flex;align-items:center;gap:8px">
                    ${renderAvatar(p1, 24)}
                    <span style="font-weight:600;color:${pc.color};font-size:13px">${escHtml(p1)}</span>
                  </div>
                </td>
                ${players.map(p2 => {
                  if (p1 === p2) return `<td style="text-align:center;padding:10px;color:var(--text-muted);border-bottom:1px solid var(--border)">—</td>`;
                  const r = matrix[p1]?.[p2] || { wins:0, losses:0, total:0 };
                  if (!r.total) return `<td style="text-align:center;padding:10px;color:var(--text-muted);font-size:12px;border-bottom:1px solid var(--border)">—</td>`;
                  const col = r.wins > r.losses ? 'var(--tier-b-text)' : r.wins < r.losses ? 'var(--tier-s-text)' : 'var(--text-secondary)';

              ${TIERS.map(t => tiers[t.label] ? `<span style="font-size:11px;font-weight:600;color:${t.text};background:${t.bg};padding:1px 7px;border-radius:99px">${t.label} ${tiers[t.label]}</span>` : '').join('')}

          <div style="display:flex;gap:2px;height:20px;border-radius:6px;overflow:hidden;background:var(--bg)">

      ${strategies.map(s => {
        const barW = Math.round(s.count / state.decks.length * 100);
        const wr = s.games > 0 ? Math.round(s.wins / s.games * 100) : null;
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <span style="font-size:18px;width:26px;text-align:center;flex-shrink:0">${s.emoji}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:13px;font-weight:500">${s.label}</span>
              <div style="display:flex;gap:12px;font-size:11px;color:var(--text-muted)">
                <span>${s.count} deck${s.count!==1?'s':''}</span>

              </div>

              <div style="height:100%;width:${barW}%;background:var(--accent-dim);border-radius:3px"></div>
            </div>

        </div>`;
      }).join('')}
    </div>`;

  // ── Most Lopsided Matchups ──────────────────────────────
  const matchups = [];
  state.decks.forEach(d1 => {
    (d1.games||[]).forEach(g => {
      if (g.result !== 'win') return;
      const d2 = state.decks.find(d => d.id === g.opponentId);
      if (!d2) return;
      const key = [d1.id, d2.id].sort().join('|');
      const existing = matchups.find(m => m.key === key);
      if (existing) { existing.games++; if (d1.id === existing.winner.id) existing.winnerWins++; }
      else matchups.push({ key, winner: d1, loser: d2, games: 1, winnerWins: 1 });
    });
  });
  const topMatchups = matchups.filter(m => m.games >= 2).sort((a, b) => b.games - a.games).slice(0, 5);

  const matchupSection = topMatchups.length ? `
    <div class="dash-section-title">Most Played Matchups</div>
    <div class="dash-card">
      ${topMatchups.map(m => {
        const wp1 = playerColor(m.winner.player);
        const wp2 = playerColor(m.loser.player);
        return `<div class="activity-entry">
          <div class="activity-dot"></div>
          <div class="activity-text" style="flex-wrap:wrap;gap:2px">
            <span style="color:${wp1.color};font-weight:500">${escHtml(m.winner.commander)}</span>
            <span style="color:var(--text-muted)"> vs </span>
            <span style="color:${wp2.color};font-weight:500">${escHtml(m.loser.commander)}</span>
          </div>
          <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);flex-shrink:0">${m.games} game${m.games!==1?'s':''}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  return `
    <div class="header">
      <div class="header-glow"></div>
      <h1>Pod <span>Meta</span></h1>
      <p>${state.decks.length} decks · ${totalGames} game${totalGames!==1?'s':''} logged</p>
    </div>
    ${colorSection}
    ${h2hSection}
    ${tierSection}
    ${archSection}
    ${matchupSection}
  `;

const AVATAR_EMOJIS = ['🧙','🐉','🦁','🦊','🐺','🦅','🌊','🔥','⚡','🌿','💀','👑','🗡️','🛡️','✨','🎭','🧿','🏹','🌙','🐦','🦇','🐲','🦄','🎯','🗺️','⚔️'];

function getPlayerStreak(playerName) {
  const allGames = state.decks
    .filter(d => d.player === playerName)
    .flatMap(d => d.games || [])
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (!allGames.length) return null;
  const first = allGames[0].result;
  let count = 0;
  for (const g of allGames) { if (g.result === first) count++; else break; }
  return { type: first, count };
}

function getHotDeck() {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  let best = null, bestWins = 0;
  state.decks.forEach(d => {
    const w = (d.games || []).filter(g => g.result === 'win' && (g.date || '') >= cutoffStr).length;
    if (w > bestWins) { bestWins = w; best = d; }
  });
  return best && bestWins > 0 ? { deck: best, wins: bestWins } : null;
}

function getWeeklySpotlight() {
  if (!state.decks.length) return null;
  const now = new Date();
  const weekNum = Math.floor((now - new Date(now.getFullYear(), 0, 1)) / 604800000);
  const sorted = [...state.decks].sort((a, b) => getOverall(b) - getOverall(a));
  return sorted[weekNum % sorted.length];
}

async function loadSpotlightArt() {
  const el = document.querySelector('.spotlight-bg[data-spotlight-art]');
  if (!el) return;
  const commander = el.getAttribute('data-spotlight-art');
  if (!commander) return;
  const key = commander.toLowerCase();
  let artUrl = null;
  const existing = scryfallCache[key];
  if (existing) {
    artUrl = typeof existing === 'string' ? existing : (existing.imageUrlArtCrop || existing.imageUrl || null);
  }
  if (!artUrl) {
    try {
      const searchName = commander.includes(' // ') ? commander.split(' // ')[0].trim() : commander;
      const resp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(searchName)}&format=json`);
      if (resp.ok) {
        const data = await resp.json();
        const iuris = data.image_uris || data.card_faces?.[0]?.image_uris;
        const imgNormal = iuris?.normal || iuris?.large || null;
        const imgArtCrop = iuris?.art_crop || imgNormal;
        artUrl = imgArtCrop;
        const backIuris = data.card_faces?.[1]?.image_uris;
        const isDF = ['transform','modal_dfc','double_faced_token','reversible_card'].includes(data.layout);
        if (!scryfallCache[key]?.imageUrl) {
          scryfallCache[key] = imgNormal ? { imageUrl: imgNormal, imageUrlArtCrop: imgArtCrop, imageUrlBack: backIuris?.normal ?? null, isDoubleFaced: isDF, backFaceName: data.card_faces?.[1]?.name ?? null } : null;
        }
      }
    } catch(e) {}
  }
  if (artUrl && document.contains(el)) {
    el.classList.remove('no-art');
    el.style.backgroundImage = `url('${artUrl}')`;
    el.removeAttribute('data-spotlight-art');
  }
}

// ===== POD FEED =====
function getPodFeed(lim = 12) {
  const events = [];
  state.decks.forEach(deck => {
    (deck.games || []).filter(g => !g.loaned && g.result === 'win').forEach(g => {
      const ts = g.ts || (g.date ? new Date(g.date + 'T12:00:00').getTime() : 0);
      if (!ts) return;
      const oppDeck = state.decks.find(d => d.id === g.opponentId);
      events.push({ type: 'game', ts, player: deck.player, deck: deck.commander, deckId: deck.id, deckName: deck.deckName || null, oppDeck: oppDeck?.commander || null, oppPlayer: oppDeck?.player || null, oppDeckId: oppDeck?.id || null });
    });
  });
  state.decks.filter(d => d.createdAt).forEach(d => {
    events.push({ type: 'deck_added', ts: d.createdAt, player: d.player, deck: d.commander, deckId: d.id, deckName: d.deckName || null });
  });
  state.decks.filter(d => d.decklistUpdatedAt && d.decklistUpdatedAt !== d.createdAt).forEach(d => {
    events.push({ type: 'decklist_updated', ts: d.decklistUpdatedAt, player: d.player, deck: d.commander, deckId: d.id, deckName: d.deckName || null });
  });
  return events.sort((a, b) => b.ts - a.ts).slice(0, lim);
}

function renderPodFeed() {
  const events = getPodFeed(12);
  if (events.length === 0) return '';
  const now = Date.now();
  const timeAgo = ts => {
    const d = now - ts;
    if (d < 60000) return 'just now';
    if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
    if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
    if (d < 604800000) return Math.floor(d / 86400000) + 'd ago';
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };
  return `
    <div class="dash-section-title">Pod Activity</div>
    <div class="dash-card" style="padding:0">
      ${events.map(ev => {
        const pc = playerColor(ev.player);
        const deckLabel = escHtml(ev.deckName || ev.deck);
        const deckLink = `<span style="cursor:pointer;font-weight:500" onclick="openDeckDetail('${ev.deckId}')">${deckLabel}</span>`;
        const playerLink = `<span style="color:${pc.color};cursor:pointer" onclick="openProfile('${escHtml(ev.player)}')">${escHtml(ev.player)}</span>`;
        let icon, text;
        if (ev.type === 'game') {
          const opc = ev.oppPlayer ? playerColor(ev.oppPlayer) : { color: 'var(--text-muted)' };
          const oppLink = ev.oppDeck
            ? `<span style="color:${opc.color};cursor:pointer" onclick="${ev.oppDeckId ? `openDeckDetail('${ev.oppDeckId}')` : `openProfile('${escHtml(ev.oppPlayer)}')`}">${escHtml(ev.oppDeck)}</span>`
            : '?';
          icon = '⚔️';
          text = `${playerLink} won with ${deckLink}${ev.oppDeck ? ` · beat ${oppLink}` : ''}`;
        } else if (ev.type === 'deck_added') {
          icon = '🃏';
          text = `${playerLink} added ${deckLink} to the pod`;
        } else {
          icon = '📋';
          text = `${playerLink} updated ${deckLink}'s decklist`;
        }
        return `<div class="activity-entry">
          <span class="activity-icon">${icon}</span>
          <div class="activity-text">${text}</div>
          <div class="activity-date">${timeAgo(ev.ts)}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function getMatchupInsights(deck) {
  const games = deck.games || [];
  if (!games.length) return null;
  const vs = {};
  games.forEach(g => {
    if (!g.opponentId) return;
    if (!vs[g.opponentId]) vs[g.opponentId] = { wins: 0, losses: 0 };
    vs[g.opponentId][g.result === 'win' ? 'wins' : 'losses']++;
  });
  const entries = Object.entries(vs).map(([id, r]) => {
    const opp = state.decks.find(d => d.id === id);
    return opp ? { opp, id, ...r, total: r.wins + r.losses } : null;
  }).filter(Boolean);
  if (!entries.length) return null;
  const byRate = [...entries].sort((a, b) => (b.wins / b.total) - (a.wins / a.total));
  return {
    prey: byRate[0]?.wins > 0 ? byRate[0] : null,
    nemesis: byRate[byRate.length - 1]?.losses > 0 ? byRate[byRate.length - 1] : null,
    rival: [...entries].sort((a, b) => b.total - a.total)[0] || null,
  };
}

async function handleAvatarPhotoSelect(input, playerName) {
  const file = input.files?.[0];
  if (!file) return;
  const status = document.getElementById('avatar-upload-status');
  if (status) status.textContent = 'Resizing…';
  try {
    // Draw to 200×200 canvas (centre-crop)
    const blob = await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 200;
        const ctx = canvas.getContext('2d');
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
        canvas.toBlob(resolve, 'image/jpeg', 0.85);
      };
      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
    if (status) status.textContent = 'Uploading…';
    const uid = state.currentUser?.uid;
    if (!uid) throw new Error('Not signed in');
    const sRef = storageRef(storage, `avatars/${uid}.jpg`);
    await uploadBytes(sRef, blob, { contentType: 'image/jpeg' });
    const url = await getDownloadURL(sRef);
    if (status) status.textContent = 'Saved!';
    // Persist to Firestore and update state
    await setDoc(doc(db, 'users', playerName), { avatar: url }, { merge: true });
    state.playerAvatars = { ...state.playerAvatars, [playerName]: url };
    state.showAvatarModal = null;
    render();
  } catch(e) {
    console.error('Avatar upload failed:', e);
    if (status) status.textContent = 'Upload failed: ' + (e.message || e.code || 'unknown error');
  }
}

async function createSession() {
  const valid = state.sessionSetup.players.filter(p => p.deckId);
  if (valid.length < 2) return;
  const id = (Date.now().toString(36).slice(-4) + Math.random().toString(36).slice(2, 5)).toUpperCase();
  const sessionData = {
    hostUid: state.currentUser?.uid || '',
    status: 'active',
    createdAt: new Date().toISOString(),
    players: valid.map(p => {
      const deck = state.decks.find(d => d.id === p.deckId);
      return { id: p.deckId, name: deck?.player || p.name, deckId: p.deckId, deckName: deck?.commander || '?', life: 40, commanderDamage: {}, poisonCounters: 0 };
    })
  };
  try {
    await setDoc(doc(db, 'gameSessions', id), sessionData);
    state.showNewGameModal = false;
    listenToSession(id);
  } catch(e) { console.error('createSession:', e); }
}

function listenToSession(id) {
  if (unsubscribeSession) { unsubscribeSession(); unsubscribeSession = null; }
  state.activeSessionId = id;
  unsubscribeSession = onSnapshot(doc(db, 'gameSessions', id), snap => {
    if (snap.exists()) {
      state.gameSession = { id: snap.id, ...snap.data() };
      if (state.tab !== 'play') { state.tab = 'play'; }
      render();
    } else {
      state.gameSession = null;
      state.activeSessionId = null;
      render();
    }
  });
}

async function updateLife(playerId, delta) {
  if (!state.gameSession || state.gameSession.status !== 'active') return;
  const players = state.gameSession.players.map(p =>
    p.id === playerId ? { ...p, life: p.life + delta } : p
  );
  await updateDoc(doc(db, 'gameSessions', state.activeSessionId), { players });
}

async function updateCmdDmg(toId, fromId, delta) {
  if (!state.gameSession || state.gameSession.status !== 'active') return;
  const players = state.gameSession.players.map(p => {
    if (p.id !== toId) return p;
    const commanderDamage = { ...(p.commanderDamage || {}) };
    commanderDamage[fromId] = Math.max(0, (commanderDamage[fromId] || 0) + delta);
    return { ...p, commanderDamage };
  });
  await updateDoc(doc(db, 'gameSessions', state.activeSessionId), { players });
}

async function endGame(winnerId) {
  if (!state.gameSession) return;
  if (winnerId) {
    const date = new Date().toISOString().split('T')[0];
    const session = state.gameSession;
    const others = session.players.filter(p => p.id !== winnerId);
    state.decks = state.decks.map(d => {
      const isWinner = d.id === winnerId;
      const isLoser = others.some(o => o.id === d.id);
      if (!isWinner && !isLoser) return d;
      // Check if the player using this deck is actually its owner
      const sessionPlayer = session.players.find(p => p.id === d.id);
      const isLoaned = sessionPlayer && d.player !== sessionPlayer.name;
      const ts = Date.now();
      const newGames = isWinner
        ? others.map(o => ({ opponentId: o.id, result: 'win', date, ts, ...(isLoaned ? { loaned: true, loanedBy: sessionPlayer.name } : {}) }))
        : [{ opponentId: winnerId, result: 'loss', date, ts, ...(isLoaned ? { loaned: true, loanedBy: sessionPlayer.name } : {}) }];
      return { ...d, games: [...(d.games || []), ...newGames] };
    });
    const batch = writeBatch(db);
    session.players.forEach(p => {
      const deck = state.decks.find(d => d.id === p.id);
      if (deck) { const { id, ...data } = deck; batch.set(doc(db, 'decks', id), data); }
    });
    await batch.commit().catch(console.error);
  }
  await updateDoc(doc(db, 'gameSessions', state.activeSessionId), {
    status: 'ended', winnerId: winnerId || null, endedAt: new Date().toISOString()
  });
  state.showEndGameModal = false;
  render();
}

              const col = SESSION_COLORS[atkIdx % SESSION_COLORS.length];
              return `<div class="cmd-dmg-cell">
                <button class="cmd-btn life-btn-minus" onclick="updateCmdDmg('${victim.id}','${atk.id}',-1)" ${dmg===0?'disabled':''}>−</button>
                <div class="cmd-dmg-cell-val" style="color:${dmg>=21?'var(--tier-s)':col}">${dmg}</div>
                <button class="cmd-btn life-btn-plus" onclick="updateCmdDmg('${victim.id}','${atk.id}',1)">+</button>
                <span class="cmd-dmg-cell-label">${escHtml(atk.name.slice(0,3))}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>` : '';

  const winnerDeck = isEnded && s.winnerId ? state.decks.find(d => d.id === s.winnerId) : null;

  return `<div style="margin-bottom:20px">
    <div class="session-header">
      <div>
        <div style="font-size:17px;font-weight:600;margin-bottom:2px">${isEnded ? '🏆 Game Over' : '⚔ Live Session'}</div>
        <div style="font-size:12px;color:var(--text-muted)">${s.players.length} players · Code: <span style="font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px">${s.id}</span></div>
      </div>
      ${isEnded
        ? `<button onclick="clearSession()" style="font-size:12px;padding:6px 14px">Close</button>`
        : `<button onclick="openEndGameModal()" style="font-size:12px;padding:6px 14px;color:var(--tier-s-text);border-color:var(--tier-s)">End Game</button>`}
    </div>
    ${isEnded && winnerDeck ? `<div class="dash-card" style="padding:12px 16px;margin-bottom:16px;border-color:var(--tier-a);background:var(--tier-a-bg)">
      <span style="font-weight:600;color:var(--tier-a-text)">🏆 ${escHtml(winnerDeck.commander)}</span>
      <span style="color:var(--text-muted);font-size:12px;margin-left:8px">${escHtml(winnerDeck.player)} wins · results logged</span>
    </div>` : ''}
    ${isEnded && !winnerDeck && s.status === 'ended' ? `<div class="dash-card" style="padding:12px 16px;margin-bottom:16px">
      <span style="color:var(--text-secondary);font-size:13px">Game ended · no winner declared</span>
    </div>` : ''}
    <div class="life-grid" style="grid-template-columns:repeat(${gridCols},1fr)">${lifeTiles}</div>
    ${cmdDmgHtml}
  </div>`;
}

// ===== FEATURE 1: MY DECKS GALLERY =====
function openMyDecksGallery() {
  state.myDecksGallery = true;
  window.scrollTo(0, 0);
  render();
  loadGalleryImages();
}

function closeMyDecksGallery() {
  state.myDecksGallery = false;
  render();
}

function renderMyDecksGallery() {
  const myDecks = getMyDecks();
  const name = currentUserName();
  const pc = playerColor(name);

  const cards = myDecks.map(deck => {
    const tier = getTier(deck.power);
    const tierInfo = getTierInfo(tier);
    const overall = getOverall(deck);
    const games = deck.games || [];
    const wins = games.filter(g => g.result === 'win').length;
    const losses = games.filter(g => g.result === 'loss').length;
    const cacheKey = (deck.commander || '').toLowerCase();
    const cached = scryfallCache[cacheKey];
    const imgUrl = typeof cached === 'object' ? cached?.imageUrlArtCrop : cached;
    const imgHtml = imgUrl
      ? `<img class="gallery-card-img" src="${escHtml(imgUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="gallery-card-placeholder">🧙</div>`;
    const recordStr = (wins + losses) > 0 ? `${wins}W-${losses}L` : '';
    const displayCommander = deck.commander?.includes(' // ') ? deck.commander.split(' // ')[0] : deck.commander;
    return `<div class="gallery-card" onclick="openDeckDetail('${escHtml(deck.id)}')">
      ${imgHtml}
      <div class="gallery-card-overlay"></div>
      <div class="gallery-card-footer">
        ${deck.deckName ? `<div class="gallery-card-deckname">${escHtml(deck.deckName)}</div>` : ''}
        <div class="gallery-card-name">${escHtml(displayCommander)}</div>
        <div class="gallery-card-meta">
          <span class="gallery-card-tier" style="background:${tierInfo.bg};color:${tierInfo.text}">${tier}</span>
          <span class="gallery-card-score">${overall}</span>
          ${recordStr ? `<span class="gallery-card-record">${recordStr}</span>` : ''}
          ${deck.colors ? `<span style="display:inline-flex;align-items:center;gap:1px">${renderManaSymbols(deck.colors, 12)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="app gallery-page">
    <button class="gallery-back" onclick="closeMyDecksGallery()">← My Decks</button>
    <div class="dash-section-title" style="margin-bottom:12px">Your Commander Collection · <span style="color:${pc.color}">${myDecks.length} deck${myDecks.length !== 1 ? 's' : ''}</span></div>
    ${myDecks.length === 0
      ? `<div class="empty"><h3>No decks yet</h3><p style="color:var(--text-secondary);font-size:13px">Add your first deck to build your gallery.</p><button class="btn-primary" style="margin-top:12px" onclick="closeMyDecksGallery();openAddModal()">+ Add deck</button></div>`
      : `<div class="gallery-grid">${cards}</div>`
    }
  </div>`;
}

async function loadGalleryImages() {
  const myDecks = getMyDecks();
  let needsRender = false;
  for (const deck of myDecks) {
    const key = (deck.commander || '').toLowerCase();
    if (!key) continue;
    const existing = scryfallCache[key];
    // Skip if already cached as an object with art, or as a string
    if (existing && (typeof existing === 'string' || existing.imageUrlArtCrop)) continue;
    try {
      // For DFCs use only the front face name for the Scryfall lookup
      const lookupName = deck.commander.includes(' // ') ? deck.commander.split(' // ')[0].trim() : deck.commander;
      const resp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(lookupName)}&format=json`);
      if (!resp.ok) continue;
      const data = await resp.json();
      const iuris = data.image_uris || data.card_faces?.[0]?.image_uris;
      const imageUrlArtCrop = iuris?.art_crop || iuris?.normal || null;
      if (imageUrlArtCrop) {
        scryfallCache[key] = { imageUrlArtCrop };
        needsRender = true;
      }
    } catch (e) {
      // ignore fetch errors
    }
    await new Promise(r => setTimeout(r, 80));
  }
  if (needsRender && state.myDecksGallery) render();
}

// ===== FEATURE 3: EXPANDABLE LEADERBOARD =====
function toggleLeaderboardExpand(playerName) {
  state.leaderboardExpanded[playerName] = !state.leaderboardExpanded[playerName];
  render();
}

function renderLeaderboardExpanded(playerName) {
  const myName = currentUserName();
  const playerDecks = state.decks.filter(d => d.player === playerName);
  const allGames = playerDecks.flatMap(d => (d.games || []).map(g => ({ ...g, deckCommander: d.commander })));
  const ownedGames = allGames.filter(g => !g.loaned);

  // Recent form: last 5 results
  const sorted = [...ownedGames].sort((a, b) => ((b.ts || 0) - (a.ts || 0)) || (b.date || '').localeCompare(a.date || ''));
  const last5 = sorted.slice(0, 5);
  const formDots = last5.map(g => {
    const isWin = g.result === 'win';
    return `<span class="lb-form-dot" style="background:${isWin ? 'var(--tier-b)' : 'var(--tier-s)'}" title="${isWin ? 'Win' : 'Loss'}"></span>`;
  }).join('');

  // Favorite deck (most played)
  const deckPlayCounts = {};
  playerDecks.forEach(d => {
    const count = (d.games || []).filter(g => !g.loaned).length;
    if (count > 0) deckPlayCounts[d.id] = { commander: d.commander, count };
  });
  const favDeck = Object.values(deckPlayCounts).sort((a, b) => b.count - a.count)[0] || null;

  // Best performing deck (min 3 games)
  const deckWinRates = playerDecks.map(d => {
    const dg = (d.games || []).filter(g => !g.loaned);
    if (dg.length < 3) return null;
    const wins = dg.filter(g => g.result === 'win').length;
    return { commander: d.commander, winRate: Math.round(wins / dg.length * 100), games: dg.length };
  }).filter(Boolean).sort((a, b) => b.winRate - a.winRate);
  const bestDeck = deckWinRates[0] || null;

  // Head-to-head vs current user
  let h2hWins = 0;
  let h2hLosses = 0;
  if (playerName !== myName) {
    const myDecks = getMyDecks();
    const myDeckIds = new Set(myDecks.map(d => d.id));
    // Count wins from playerName's perspective against myDecks
    playerDecks.forEach(d => {
      (d.games || []).filter(g => !g.loaned).forEach(g => {
        if (g.result === 'win' && myDeckIds.has(g.opponentId)) h2hWins++;
        if (g.result === 'loss' && myDeckIds.has(g.opponentId)) h2hLosses++;
      });
    });
  }

  return `<div class="lb-expand-row">
    <div class="lb-expand-row-inner">
      ${last5.length > 0 ? `
        <div class="lb-expand-section">Recent form</div>
        <div class="lb-form-dots">${formDots}</div>` : ''}
      ${favDeck ? `
        <div class="lb-expand-section">Favourite deck</div>
        <div class="lb-expand-deck">${escHtml(favDeck.commander)} <span style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px">(${favDeck.count}g)</span></div>` : ''}
      ${bestDeck ? `
        <div class="lb-expand-section">Best deck (≥3 games)</div>
        <div class="lb-expand-deck">${escHtml(bestDeck.commander)} <span style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px">${bestDeck.winRate}% in ${bestDeck.games}g</span></div>` : ''}
      ${playerName !== myName && (h2hWins + h2hLosses) > 0 ? `
        <div class="lb-expand-section">Head-to-head vs you</div>
        <div class="lb-expand-h2h"><span style="color:var(--tier-s-text)">${h2hWins}W</span> – <span style="color:var(--tier-b-text)">${h2hLosses}L</span> <span style="color:var(--text-muted);font-size:11px">(${playerName}'s perspective)</span></div>` : ''}
      ${last5.length === 0 && !favDeck && !bestDeck ? `<div style="font-size:12px;color:var(--text-muted)">No games recorded yet.</div>` : ''}
    </div>
  </div>`;
}

// Scroll-to-zoom on battlefield (also handles trackpad pinch via ctrlKey+wheel)
document.addEventListener('wheel', function(e) {
  const bfEl = document.getElementById('pt-battlefield');
  if (!bfEl) return;
  const r = bfEl.getBoundingClientRect();
  if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) return;
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
  applyScale(factor, e.clientX, e.clientY);
}, { passive: false });
