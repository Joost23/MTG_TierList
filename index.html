<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander Tier List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #0C0B0F;
  --bg-card: #16151A;
  --bg-hover: #1C1B22;
  --bg-surface: #1F1E25;
  --border: #2A2930;
  --border-hover: #3A394A;
  --text: #E8E6EF;
  --text-secondary: #9896A3;
  --text-muted: #5E5C6B;
  --accent: #A78BFA;
  --accent-dim: #7C5FC7;
  --tier-s: #E24B4A;
  --tier-s-bg: #2A1414;
  --tier-s-text: #F5A5A4;
  --tier-a: #EF9F27;
  --tier-a-bg: #2A2010;
  --tier-a-text: #F5D08A;
  --tier-b: #1D9E75;
  --tier-b-bg: #0D2A1F;
  --tier-b-text: #7EDDBC;
  --tier-c: #378ADD;
  --tier-c-bg: #0D1E2A;
  --tier-c-text: #8FC5F0;
  --tier-d: #888780;
  --tier-d-bg: #1A1A18;
  --tier-d-text: #B5B4AD;
  --player-joost: #A78BFA;
  --player-joost-bg: #1E1835;
  --player-willem: #34D399;
  --player-willem-bg: #0D2A1F;
  --player-josh: #FBBF24;
  --player-josh-bg: #2A2010;
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
}
html { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; background: var(--bg); }
button { font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); border-radius: var(--radius-sm); transition: all var(--transition); }
button:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-hover); }
button.active { background: var(--bg-surface); color: var(--text); border-color: var(--accent-dim); }
input, textarea, select { font-family: inherit; background: var(--bg-card); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 14px; transition: border-color var(--transition); outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent-dim); }

.app { max-width: 760px; margin: 0 auto; padding: 24px 20px 80px; }

/* Header */
.header { margin-bottom: 24px; position: relative; }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.header h1 span { color: var(--accent); }
.header p { font-size: 14px; color: var(--text-secondary); }
.header-glow { position: absolute; top: -60px; left: -40px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%); pointer-events: none; }

/* Pod Stats */
.pod-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
.pod-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; transition: border-color var(--transition); }
.pod-stat:hover { border-color: var(--border-hover); }
.pod-stat-name { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.pod-stat-value { font-size: 26px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.pod-stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* Controls */
.controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.control-group { display: flex; gap: 2px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 2px; }
.control-group button { border: none; background: transparent; padding: 5px 12px; font-size: 12px; border-radius: 4px; }
.control-group button.active { background: var(--bg-surface); color: var(--text); }
.control-group button:hover:not(.active) { background: var(--bg-hover); }
.spacer { flex: 1; }

/* Tier bar */
.tier-bar { display: flex; gap: 2px; margin-bottom: 24px; border-radius: var(--radius-sm); overflow: hidden; }
.tier-bar-seg { flex: 1; text-align: center; padding: 7px 0; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

/* Tier sections */
.tier-section { margin-bottom: 24px; }
.tier-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-left: 2px; }
.tier-badge { width: 26px; height: 26px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.tier-label { font-size: 13px; font-weight: 500; }
.tier-count { font-size: 12px; color: var(--text-muted); }

/* Deck cards */
.deck-list { display: flex; flex-direction: column; gap: 6px; }
.deck-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 3px solid var(--tier-color);
  animation: fadeIn 0.3s ease both;
}
.deck-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
.deck-top { display: flex; justify-content: space-between; align-items: flex-start; }
.deck-info { flex: 1; min-width: 0; }
.deck-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.deck-tier-mini { width: 26px; height: 26px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
.deck-commander { font-size: 15px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.deck-meta { display: flex; gap: 8px; align-items: center; margin-left: 36px; flex-wrap: wrap; }
.deck-player { padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.deck-colors { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
.deck-score { text-align: right; flex-shrink: 0; margin-left: 16px; }
.deck-score-value { font-size: 24px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.deck-score-label { font-size: 11px; color: var(--text-muted); }

/* Expanded area */
.deck-expanded { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.stat-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 8px; }
.stat-label { width: 95px; color: var(--text-secondary); flex-shrink: 0; }
.stat-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.stat-value { width: 30px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
.deck-notes { font-size: 13px; color: var(--text-secondary); margin-top: 14px; line-height: 1.65; font-style: italic; border-left: 2px solid var(--border); padding-left: 12px; }
.deck-actions { display: flex; gap: 8px; margin-top: 14px; }
.deck-actions button { font-size: 12px; padding: 5px 14px; }
.btn-danger { color: var(--tier-s) !important; }
.btn-danger:hover { background: var(--tier-s-bg) !important; border-color: var(--tier-s) !important; }

/* Win/Loss record */
.record-section { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius-sm); }
.record-stat { display: flex; flex-direction: column; align-items: center; min-width: 36px; }
.record-stat-value { font-size: 17px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.record-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.4px; }
.record-divider { width: 1px; height: 30px; background: var(--border); margin: 0 2px; }
.record-rate { font-size: 13px; color: var(--text-secondary); margin-left: 4px; }
.record-btns { display: flex; gap: 6px; margin-left: auto; }
.btn-win { font-size: 12px !important; padding: 4px 12px !important; color: var(--tier-b-text) !important; border-color: var(--tier-b) !important; }
.btn-win:hover { background: var(--tier-b-bg) !important; }
.btn-loss { font-size: 12px !important; padding: 4px 12px !important; color: var(--tier-s-text) !important; border-color: var(--tier-s) !important; }
.btn-loss:hover { background: var(--tier-s-bg) !important; }
.deck-record-badge { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.log-game-form { margin-top: 10px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.log-game-btns { display: flex; gap: 6px; }
.autocomplete-wrap { position: relative; flex: 1; min-width: 160px; }
.autocomplete-wrap input[type="text"] { width: 100%; font-size: 13px; }
.autocomplete-list { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: var(--bg-surface); border: 1px solid var(--border-hover); border-radius: var(--radius-sm); z-index: 20; max-height: 200px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.autocomplete-item { padding: 7px 10px; font-size: 13px; cursor: pointer; }
.autocomplete-item:hover, .autocomplete-item.active { background: var(--bg-hover); }
.game-history { margin-top: 10px; }
.game-history-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.game-entry { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.game-entry:last-child { border-bottom: none; }
.game-result-badge { font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }
.game-result-win { background: var(--tier-b-bg); color: var(--tier-b-text); }
.game-result-loss { background: var(--tier-s-bg); color: var(--tier-s-text); }
.game-opponent { flex: 1; color: var(--text-secondary); }
.game-date { font-size: 11px; color: var(--text-muted); }
.game-remove { font-size: 13px; color: var(--text-muted); background: none !important; border: none !important; padding: 0 4px !important; line-height: 1; }
.game-remove:hover { color: var(--tier-s-text) !important; background: none !important; }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
.empty h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.empty button { margin-top: 12px; padding: 8px 20px; font-size: 13px; }

/* Footer */
.footer { margin-top: 32px; display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.footer-info { flex: 1; min-width: 240px; padding: 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.footer-info strong { color: var(--text); font-weight: 500; }
.footer button { font-size: 11px; padding: 8px 14px; }

/* Modal overlay */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-field input, .modal-field textarea, .modal-field select { width: 100%; }
.modal-field textarea { min-height: 70px; resize: vertical; }
.modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-actions button { padding: 8px 20px; font-size: 13px; }
.btn-primary { background: var(--accent-dim) !important; color: #fff !important; border-color: var(--accent) !important; }
.btn-primary:hover { background: var(--accent) !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 600px) {
  .app { padding: 16px 14px 60px; }
  .header h1 { font-size: 22px; }
  .pod-stats { grid-template-columns: 1fr; }
  .controls { gap: 4px; }
  .modal { padding: 20px; }
  .modal-row { grid-template-columns: 1fr; }
}
</style>
</head>

const PLAYERS = ["All", "Joost", "Willem", "Josh"];

// ===== HELPERS =====
function getTier(power) {
  if (power >= 9) return "S";
  if (power >= 7) return "A";
  if (power >= 5) return "B";
  if (power >= 3) return "C";
  return "D";
}
function getOverall(d) {
  return Math.round(((d.power + d.synergy + d.theme + d.optimization) / 4) * 10) / 10;
}
function getTierInfo(label) {
  return TIERS.find(t => t.label === label) || TIERS[4];
}
function playerColor(p) {
  if (p === "Joost") return { bg: "var(--player-joost-bg)", color: "var(--player-joost)" };
  if (p === "Willem") return { bg: "var(--player-willem-bg)", color: "var(--player-willem)" };
  return { bg: "var(--player-josh-bg)", color: "var(--player-josh)" };
}

// ===== STATE =====
let state = {
  decks: [],
  view: "tiers",
  playerFilter: "All",
  sortBy: "power",
  expanded: {},
  showAddModal: false,
  editDeck: null,
  loggingGame: null,
  loaded: false,
};

// ===== STORAGE =====
function loadDecks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.length > 0) return parsed;
    }
  } catch {}
  return [...INITIAL_DECKS];
}
function saveDecks(decks) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(decks)); } catch {}
}

// ===== RENDER =====
function render() {
  const app = document.getElementById("app");
  const decks = state.decks;
  const filtered = state.playerFilter === "All" ? decks : decks.filter(d => d.player === state.playerFilter);
  const sorted = [...filtered].sort((a, b) => {
    if (state.sortBy === "power") return b.power - a.power || getOverall(b) - getOverall(a);
    return getOverall(b) - getOverall(a);
  });

  // Pod stats
  const players = ["Joost", "Willem", "Josh"];
  const podStats = players.map(p => {
    const pd = decks.filter(d => d.player === p);
    const avg = pd.length ? Math.round((pd.reduce((s, d) => s + getOverall(d), 0) / pd.length) * 10) / 10 : 0;
    const avgP = pd.length ? Math.round((pd.reduce((s, d) => s + d.power, 0) / pd.length) * 10) / 10 : 0;
    const totalW = pd.reduce((s, d) => s + (d.wins || 0), 0);
    const totalL = pd.reduce((s, d) => s + (d.losses || 0), 0);
    return { player: p, count: pd.length, avg, avgPower: avgP, wins: totalW, losses: totalL };
  });

  let html = `
    <div class="header">
      <div class="header-glow"></div>
      <h1>Commander <span>Tier List</span></h1>
      <p>${decks.length} decks across ${new Set(decks.map(d=>d.player)).size} builders</p>
    </div>

    <div class="pod-stats">
      ${podStats.map(s => {
        const pc = playerColor(s.player);
        const hasGames = s.wins + s.losses > 0;
        const recordStr = hasGames ? ` · ${s.wins}W-${s.losses}L` : '';
        return `<div class="pod-stat">
          <div class="pod-stat-name" style="color:${pc.color}">${s.player}</div>
          <div class="pod-stat-value">${s.avg}</div>
          <div class="pod-stat-sub">${s.count} decks · ${s.avgPower} avg power${recordStr}</div>
        </div>`;
      }).join("")}
    </div>

    <div class="controls">
      <div class="control-group">
        ${PLAYERS.map(p => `<button class="${state.playerFilter===p?'active':''}" onclick="setFilter('${p}')">${p}</button>`).join("")}
      </div>
      <div class="spacer"></div>
      <div class="control-group">
        <button class="${state.view==='tiers'?'active':''}" onclick="setView('tiers')">By tier</button>
        <button class="${state.view==='list'?'active':''}" onclick="setView('list')">Ranked</button>
      </div>
      <div class="control-group">
        <button class="${state.sortBy==='power'?'active':''}" onclick="setSort('power')">Power</button>
        <button class="${state.sortBy==='overall'?'active':''}" onclick="setSort('overall')">Overall</button>
      </div>
      <button onclick="openAddModal()" style="padding:5px 14px;font-size:12px;background:var(--accent-dim);color:#fff;border-color:var(--accent)">+ Add deck</button>
    </div>

    <div class="tier-bar">
      ${TIERS.map(t => {
        const count = filtered.filter(d => getTier(d.power) === t.label).length;
        return `<div class="tier-bar-seg" style="background:${t.bg};color:${t.text}">${t.label} <span style="font-weight:400;font-size:11px">(${count})</span></div>`;
      }).join("")}
    </div>
  `;

  if (filtered.length === 0) {
    html += `<div class="empty"><h3>No decks match filter</h3><p style="color:var(--text-secondary);font-size:13px">Try a different filter</p><button onclick="setFilter('All')">Show all</button></div>`;
  } else if (state.view === "tiers") {
    TIERS.forEach(tier => {
      const td = sorted.filter(d => getTier(d.power) === tier.label);
      if (!td.length) return;
      html += `<div class="tier-section">
        <div class="tier-header">
          <div class="tier-badge" style="background:${tier.bg};color:${tier.text}">${tier.label}</div>
          <span class="tier-label" style="color:${tier.text}">${tier.desc}</span>
          <span class="tier-count">(${td.length})</span>
        </div>
        <div class="deck-list">${td.map((d,i) => renderDeckCard(d, tier, i)).join("")}</div>
      </div>`;
    });
  } else {
    html += `<div class="deck-list">${sorted.map((d,i) => {
      const tier = getTierInfo(getTier(d.power));
      return renderDeckCard(d, tier, i);
    }).join("")}</div>`;
  }

  html += `
    <div class="footer">
      <div class="footer-info">
        <strong>Add decks:</strong> Click "+ Add deck" above, or paste a decklist in chat and I'll rate it and add it automatically.
      </div>
      <button onclick="resetData()" style="color:var(--text-muted)">Reset to defaults</button>
    </div>
  `;

  // Modal
  if (state.showAddModal) {
    const e = state.editDeck;
    html += `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h2>${e ? 'Edit' : 'Add'} Deck</h2>
        <div class="modal-field">
          <label>Commander</label>
          <input id="m-commander" value="${e ? escHtml(e.commander) : ''}" placeholder="e.g. Edgar Markov">
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>Player</label>
            <select id="m-player">
              ${players.map(p => `<option value="${p}" ${e && e.player===p ? 'selected' : ''}>${p}</option>`).join("")}
            </select>
          </div>
          <div class="modal-field">
            <label>Colors</label>
            <input id="m-colors" value="${e ? escHtml(e.colors) : ''}" placeholder="e.g. WUBRG">
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field"><label>Power (1-10)</label><input id="m-power" type="number" min="1" max="10" step="0.5" value="${e?e.power:'7'}"></div>
          <div class="modal-field"><label>Synergy (1-10)</label><input id="m-synergy" type="number" min="1" max="10" step="0.5" value="${e?e.synergy:'7'}"></div>
        </div>
        <div class="modal-row">
          <div class="modal-field"><label>Theme (1-10)</label><input id="m-theme" type="number" min="1" max="10" step="0.5" value="${e?e.theme:'7'}"></div>
          <div class="modal-field"><label>Optimization (1-10)</label><input id="m-optimization" type="number" min="1" max="10" step="0.5" value="${e?e.optimization:'7'}"></div>
        </div>
        <div class="modal-field">
          <label>Notes</label>
          <textarea id="m-notes" placeholder="Brief analysis of the deck...">${e ? escHtml(e.notes||'') : ''}</textarea>
        </div>
        <div class="modal-actions">
          <button onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="saveDeck()">${e ? 'Update' : 'Add'} Deck</button>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML = html;
}

function renderDeckCard(deck, tier, index) {
  const overall = getOverall(deck);
  const isExpanded = state.expanded[deck.id];
  const pc = playerColor(deck.player);
  const delay = Math.min(index * 30, 500);
  const games = deck.games || [];
  const wins = games.filter(g => g.result === 'win').length;
  const losses = games.filter(g => g.result === 'loss').length;
  const total = wins + losses;

  let card = `<div class="deck-card" style="border-left-color:${tier.color};animation-delay:${delay}ms" onclick="toggleExpand('${deck.id}')">
    <div class="deck-top">
      <div class="deck-info">
        <div class="deck-name-row">
          <div class="deck-tier-mini" style="background:${tier.bg};color:${tier.text}">${tier.label}</div>
          <span class="deck-commander">${escHtml(deck.commander)}</span>
        </div>
        <div class="deck-meta">
          <span class="deck-player" style="background:${pc.bg};color:${pc.color}">${escHtml(deck.player)}</span>
          <span class="deck-colors">${escHtml(deck.colors)}</span>
          ${total > 0 ? `<span class="deck-record-badge">${wins}W-${losses}L</span>` : ''}
        </div>
      </div>
      <div class="deck-score">
        <div class="deck-score-value">${overall}</div>
        <div class="deck-score-label">overall</div>
      </div>
    </div>`;

  if (isExpanded) {
    const winRate = total > 0 ? Math.round((wins / total) * 100) : null;
    card += `<div class="deck-expanded">
      ${renderStat("Power", deck.power, tier.color)}
      ${renderStat("Synergy", deck.synergy, tier.color)}
      ${renderStat("Theme", deck.theme, tier.color)}
      ${renderStat("Optimization", deck.optimization, tier.color)}
      ${deck.notes ? `<div class="deck-notes">${escHtml(deck.notes)}</div>` : ''}
      <div class="record-section">
        <div class="record-stat">
          <span class="record-stat-value" style="color:var(--tier-b-text)">${wins}</span>
          <span class="record-stat-label">Wins</span>
        </div>
        <div class="record-divider"></div>
        <div class="record-stat">
          <span class="record-stat-value" style="color:var(--tier-s-text)">${losses}</span>
          <span class="record-stat-label">Losses</span>
        </div>
        ${winRate !== null ? `<div class="record-divider"></div><span class="record-rate">${winRate}%</span>` : '<span class="record-rate" style="color:var(--text-muted)">No games</span>'}
        <div class="record-btns">
          <button style="font-size:12px;padding:4px 12px" onclick="event.stopPropagation();startLogGame('${deck.id}')">Log game</button>
        </div>
      </div>
      ${state.loggingGame === deck.id ? (() => {
        const others = state.decks.filter(d => d.id !== deck.id).sort((a,b) => a.player.localeCompare(b.player) || a.commander.localeCompare(b.commander));
        return `<div class="log-game-form" onclick="event.stopPropagation()">
          <div class="autocomplete-wrap">
            <input type="text" id="log-opp-input-${deck.id}" placeholder="Type opponent name…" autocomplete="off"
              oninput="filterOpponents('${deck.id}',this.value)"
              onfocus="filterOpponents('${deck.id}',this.value)"
              onblur="setTimeout(()=>{const l=document.getElementById('log-opp-list-${deck.id}');if(l)l.style.display='none'},150)"
              onkeydown="handleOpponentKey(event,'${deck.id}')">
            <input type="hidden" id="log-opp-${deck.id}" value="">
            <div id="log-opp-list-${deck.id}" class="autocomplete-list" style="display:none"></div>
          </div>
          <div class="log-game-btns">
            <button class="btn-win" onclick="event.stopPropagation();submitGame('${deck.id}','win')">Won</button>
            <button class="btn-loss" onclick="event.stopPropagation();submitGame('${deck.id}','loss')">Lost</button>
            <button style="font-size:12px;padding:4px 10px" onclick="event.stopPropagation();cancelLogGame()">Cancel</button>
          </div>
        </div>`;
      })() : ''}
      ${games.length > 0 ? (() => {
        const entries = games.slice().reverse().map((g, ri) => {
          const origIdx = games.length - 1 - ri;
          const opp = state.decks.find(d => d.id === g.opponentId);
          const oppName = opp ? escHtml(opp.commander) : 'Unknown deck';
          const oppPlayer = opp ? ` <span style="color:var(--text-muted)">· ${escHtml(opp.player)}</span>` : '';
          return `<div class="game-entry">
            <span class="game-result-badge game-result-${g.result}">${g.result === 'win' ? 'W' : 'L'}</span>
            <span class="game-opponent">${oppName}${oppPlayer}</span>
            ${g.date ? `<span class="game-date">${g.date}</span>` : ''}
            <button class="game-remove" onclick="event.stopPropagation();removeGame('${deck.id}',${origIdx})" title="Remove">×</button>
          </div>`;
        }).join('');
        return `<div class="game-history"><div class="game-history-title">Game history (${games.length})</div>${entries}</div>`;
      })() : ''}
      <div class="deck-actions">
        <button onclick="event.stopPropagation();editDeck('${deck.id}')">Edit</button>
        <button class="btn-danger" onclick="event.stopPropagation();deleteDeck('${deck.id}')">Remove</button>
      </div>
    </div>`;
  }

  card += `</div>`;
  return card;
}

function renderStat(label, value, color) {
  return `<div class="stat-row">
    <span class="stat-label">${label}</span>
    <div class="stat-track"><div class="stat-fill" style="width:${value*10}%;background:${color}"></div></div>
    <span class="stat-value">${value}</span>
  </div>`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== ACTIONS =====
function setFilter(p) { state.playerFilter = p; render(); }
function setView(v) { state.view = v; render(); }
function setSort(s) { state.sortBy = s; render(); }
function toggleExpand(id) { state.expanded[id] = !state.expanded[id]; render(); }

function openAddModal(deck) {
  state.editDeck = deck || null;
  state.showAddModal = true;
  render();
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  state.showAddModal = false;
  state.editDeck = null;
  render();
}
function editDeck(id) {
  const deck = state.decks.find(d => d.id === id);
  if (deck) openAddModal({...deck});
}
function saveDeck() {
  const commander = document.getElementById("m-commander").value.trim();
  if (!commander) return;
  const data = {
    commander,
    player: document.getElementById("m-player").value,
    colors: document.getElementById("m-colors").value.trim().toUpperCase(),
    power: parseFloat(document.getElementById("m-power").value) || 7,
    synergy: parseFloat(document.getElementById("m-synergy").value) || 7,
    theme: parseFloat(document.getElementById("m-theme").value) || 7,
    optimization: parseFloat(document.getElementById("m-optimization").value) || 7,
    notes: document.getElementById("m-notes").value.trim(),
  };
  if (state.editDeck && state.editDeck.id) {
    state.decks = state.decks.map(d => d.id === state.editDeck.id ? { ...d, ...data } : d);
  } else {
    data.id = commander.toLowerCase().replace(/[^a-z0-9]/g,'-') + '-' + Date.now();
    state.decks.push(data);
  }
  saveDecks(state.decks);
  state.showAddModal = false;
  state.editDeck = null;
  render();
}
function startLogGame(id) {
  state.loggingGame = id;
  render();
}
function cancelLogGame() {
  state.loggingGame = null;
  render();
}
function filterOpponents(deckId, query) {
  const list = document.getElementById('log-opp-list-' + deckId);
  const hidden = document.getElementById('log-opp-' + deckId);
  if (!list) return;
  hidden.value = '';
  const others = state.decks.filter(d => d.id !== deckId);
  const q = query.toLowerCase().trim();
  const matches = q ? others.filter(d => d.commander.toLowerCase().includes(q) || d.player.toLowerCase().includes(q)) : others;
  if (!matches.length) { list.style.display = 'none'; return; }
  list.innerHTML = matches.map(d =>
    `<div class="autocomplete-item" data-id="${d.id}" data-name="${escHtml(d.commander)}"
       onmousedown="event.preventDefault();selectOpponent('${deckId}',this.dataset.id,this.dataset.name)"
     >${escHtml(d.commander)} <span style="color:var(--text-muted)">· ${escHtml(d.player)}</span></div>`
  ).join('');
  list.style.display = 'block';
}

function selectOpponent(deckId, oppId, oppName) {
  const input = document.getElementById('log-opp-input-' + deckId);
  const hidden = document.getElementById('log-opp-' + deckId);
  const list = document.getElementById('log-opp-list-' + deckId);
  if (input) input.value = oppName;
  if (hidden) hidden.value = oppId;
  if (list) list.style.display = 'none';
}

function handleOpponentKey(e, deckId) {
  const list = document.getElementById('log-opp-list-' + deckId);
  if (!list || list.style.display === 'none') return;
  const items = list.querySelectorAll('.autocomplete-item');
  const active = list.querySelector('.autocomplete-item.active');
  let idx = Array.from(items).indexOf(active);
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); }
  else if (e.key === 'Enter' && active) { e.preventDefault(); active.dispatchEvent(new MouseEvent('mousedown')); return; }
  else if (e.key === 'Escape') { list.style.display = 'none'; return; }
  else return;
  items.forEach(i => i.classList.remove('active'));
  if (items[idx]) items[idx].classList.add('active');
}

function submitGame(deckId, result) {
  const hidden = document.getElementById('log-opp-' + deckId);
  if (!hidden || !hidden.value) {
    const ti = document.getElementById('log-opp-input-' + deckId);
    if (ti) ti.focus();
    return;
  }
  const opponentId = hidden.value;
  const date = new Date().toISOString().split('T')[0];
  state.decks = state.decks.map(d => {
    if (d.id !== deckId) return d;
    return { ...d, games: [...(d.games || []), { opponentId, result, date }] };
  });
  saveDecks(state.decks);
  state.loggingGame = null;
  render();
}
function removeGame(deckId, index) {
  state.decks = state.decks.map(d => {
    if (d.id !== deckId) return d;
    const games = (d.games || []).filter((_, i) => i !== index);
    return { ...d, games };
  });
  saveDecks(state.decks);
  render();
}
function deleteDeck(id) {
  if (!confirm("Remove this deck from the tier list?")) return;
  state.decks = state.decks.filter(d => d.id !== id);
  saveDecks(state.decks);
  render();
}
function resetData() {
  if (!confirm("Reset all decks to defaults? This removes any custom additions.")) return;
  state.decks = [...INITIAL_DECKS];
  saveDecks(state.decks);
  render();
}

// ===== INIT =====
state.decks = loadDecks();
state.loaded = true;
render();
</script>
</body>
</html>
