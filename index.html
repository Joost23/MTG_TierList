// ===== GAME SESSION =====
const SESSION_COLORS = ['#A78BFA', '#34D399', '#FBBF24', '#F472B6'];

function openNewGameModal() {
  const allPlayers = [...new Set(state.decks.map(d => d.player))];
  state.sessionSetup = {
    players: allPlayers.map(name => ({
      name,
      deckId: state.decks.find(d => d.player === name)?.id || ''
    })).filter(p => p.deckId).slice(0, 4)
  };
  state.showNewGameModal = true;
  render();
}
function closeNewGameModal() { state.showNewGameModal = false; render(); }

function setSessionPlayer(i, key, val) {
  state.sessionSetup.players = state.sessionSetup.players.map((p, idx) => {
    if (idx !== i) return p;
    if (key === 'name') return { ...p, name: val, deckId: state.decks.find(d => d.player === val)?.id || '' };
    return { ...p, [key]: val };
  });
  render();
}
function addSessionPlayer() {
  const allPlayers = [...new Set(state.decks.map(d => d.player))];
  const existing = state.sessionSetup.players.map(p => p.name);
  const next = allPlayers.find(p => !existing.includes(p)) || allPlayers[0] || '';
  state.sessionSetup.players = [...state.sessionSetup.players, { name: next, deckId: state.decks.find(d => d.player === next)?.id || '' }];
  render();
}
function removeSessionPlayer(i) {
  state.sessionSetup.players = state.sessionSetup.players.filter((_, idx) => idx !== i);
  render();
}

async function createSession() {
  const valid = state.sessionSetup.players.filter(p => p.deckId);
  if (valid.length < 2) return;
  const id = (Date.now().toString(36).slice(-4) + Math.random().toString(36).slice(2, 5)).toUpperCase();
  const sessionData = {
    hostUid: state.currentUser?.uid || '',
    status: 'active',
    createdAt: new Date().toISOString(),
    players: valid.map(p => {
      const deck = state.decks.find(d => d.id === p.deckId);
      return { id: p.deckId, name: deck?.player || p.name, deckId: p.deckId, deckName: deck?.commander || '?', life: 40, commanderDamage: {}, poisonCounters: 0 };
    })
  };
  try {
    await setDoc(doc(db, 'gameSessions', id), sessionData);
    state.showNewGameModal = false;
    listenToSession(id);
  } catch(e) { console.error('createSession:', e); }
}

async function joinSession(id) {
  if (!id) return;
  state.showJoinInput = false;
  listenToSession(id.toUpperCase());
}

function listenToSession(id) {
  if (unsubscribeSession) { unsubscribeSession(); unsubscribeSession = null; }
  state.activeSessionId = id;
  unsubscribeSession = onSnapshot(doc(db, 'gameSessions', id), snap => {
    if (snap.exists()) {
      state.gameSession = { id: snap.id, ...snap.data() };
      if (state.tab !== 'play') { state.tab = 'play'; }
      render();
    } else {
      state.gameSession = null;
      state.activeSessionId = null;
      render();
    }
  });
}

async function updateLife(playerId, delta) {
  if (!state.gameSession || state.gameSession.status !== 'active') return;
  const players = state.gameSession.players.map(p =>
    p.id === playerId ? { ...p, life: p.life + delta } : p
  );
  await updateDoc(doc(db, 'gameSessions', state.activeSessionId), { players });
}

async function updateCmdDmg(toId, fromId, delta) {
  if (!state.gameSession || state.gameSession.status !== 'active') return;
  const players = state.gameSession.players.map(p => {
    if (p.id !== toId) return p;
    const commanderDamage = { ...(p.commanderDamage || {}) };
    commanderDamage[fromId] = Math.max(0, (commanderDamage[fromId] || 0) + delta);
    return { ...p, commanderDamage };
  });
  await updateDoc(doc(db, 'gameSessions', state.activeSessionId), { players });
}

function openEndGameModal() { state.showEndGameModal = true; render(); }
function closeEndGameModal() { state.showEndGameModal = false; render(); }

async function endGame(winnerId) {
  if (!state.gameSession) return;
  if (winnerId) {
    const date = new Date().toISOString().split('T')[0];
    const session = state.gameSession;
    const others = session.players.filter(p => p.id !== winnerId);
    state.decks = state.decks.map(d => {
      const isWinner = d.id === winnerId;
      const isLoser = others.some(o => o.id === d.id);
      if (!isWinner && !isLoser) return d;
      const newGames = isWinner
        ? others.map(o => ({ opponentId: o.id, result: 'win', date }))
        : [{ opponentId: winnerId, result: 'loss', date }];
      return { ...d, games: [...(d.games || []), ...newGames] };
    });
    const batch = writeBatch(db);
    session.players.forEach(p => {
      const deck = state.decks.find(d => d.id === p.id);
      if (deck) { const { id, ...data } = deck; batch.set(doc(db, 'decks', id), data); }
    });
    await batch.commit().catch(console.error);
  }
  await updateDoc(doc(db, 'gameSessions', state.activeSessionId), {
    status: 'ended', winnerId: winnerId || null, endedAt: new Date().toISOString()
  });
  state.showEndGameModal = false;
  render();
}

async function clearSession() {
  if (unsubscribeSession) { unsubscribeSession(); unsubscribeSession = null; }
  state.activeSessionId = null;
  state.gameSession = null;
  render();
}

function renderNewGameModal() {
  const allPlayers = [...new Set(state.decks.map(d => d.player))];
  const setup = state.sessionSetup;
  return `<div class="modal-overlay" onclick="closeNewGameModal()">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:440px">
      <h2 style="margin-bottom:6px">New Game</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:18px">Pick 2–4 players and their decks.</p>
      ${setup.players.map((p, i) => `
        <div class="session-setup-row">
          <select onchange="setSessionPlayer(${i},'name',this.value)" style="width:100px;flex-shrink:0">
            ${allPlayers.map(pl => `<option value="${escHtml(pl)}" ${p.name===pl?'selected':''}>${escHtml(pl)}</option>`).join('')}
          </select>

      ${setup.players.length < 4 ? `<button onclick="addSessionPlayer()" style="font-size:12px;padding:5px 14px;margin-bottom:18px">+ Add player</button>` : ''}

      </div>
    </div>
  </div>`;
}

function renderEndGameModal(session) {
  return `<div class="modal-overlay" onclick="closeEndGameModal()">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:360px">
      <h2 style="margin-bottom:6px">End Game</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:18px">Who won? Results will be logged to each deck's history.</p>
      ${session.players.map((p, i) => {
        const col = SESSION_COLORS[i % SESSION_COLORS.length];
        const lifeColor = p.life <= 5 ? 'var(--tier-s-text)' : p.life <= 15 ? 'var(--tier-a-text)' : 'var(--text)';
        return `<button onclick="endGame('${p.id}')" style="width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;font-size:14px;border-radius:var(--radius);display:flex;align-items:center;gap:10px;border-color:${col}44">
          <span style="font-weight:600;color:${col}">${escHtml(p.deckName)}</span>
          <span style="color:var(--text-muted);font-size:12px">${escHtml(p.name)}</span>
          <span style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:${lifeColor}">${p.life}♥</span>
        </button>`;
      }).join('')}
      <button onclick="endGame(null)" style="width:100%;padding:10px;font-size:13px;margin-top:4px;color:var(--text-muted)">No winner / Draw</button>
      <div style="text-align:center;margin-top:10px">
        <button onclick="closeEndGameModal()" style="font-size:12px;padding:4px;border:none;background:transparent;color:var(--text-muted)">Cancel</button>
      </div>
    </div>
  </div>`;
}

function renderActiveSession() {
  const s = state.gameSession;
  const isEnded = s.status === 'ended';
  const gridCols = s.players.length > 2 ? 2 : s.players.length;

  const lifeTiles = s.players.map((p, i) => {
    const col = SESSION_COLORS[i % SESSION_COLORS.length];
    const isDead = p.life <= 0;
    const lifeColor = p.life <= 5 ? 'var(--tier-s)' : p.life <= 15 ? 'var(--tier-a)' : 'var(--text)';
    const totalCmdDmg = Object.values(p.commanderDamage || {}).reduce((a, b) => a + b, 0);
    return `<div class="life-tile ${isDead ? 'life-dead' : ''}" style="border-color:${col}55">
      <div class="life-tile-name" style="color:${col}">${escHtml(p.name)}</div>
      <div class="life-tile-deck">${escHtml(p.deckName)}</div>
      <div class="life-number" style="color:${lifeColor}">${p.life}</div>
      ${!isEnded ? `<div class="life-controls">
        <button class="life-btn life-btn-minus life-btn-sm" onclick="updateLife('${p.id}',-5)">−5</button>
        <button class="life-btn life-btn-minus" onclick="updateLife('${p.id}',-1)">−</button>
        <button class="life-btn life-btn-plus" onclick="updateLife('${p.id}',1)">+</button>
        <button class="life-btn life-btn-plus life-btn-sm" onclick="updateLife('${p.id}',5)">+5</button>
      </div>` : ''}
      ${totalCmdDmg > 0 ? `<div style="font-size:11px;color:var(--text-muted);margin-top:8px">⚔ ${totalCmdDmg} cmd dmg</div>` : ''}
    </div>`;
  }).join('');

  // Commander damage matrix (only show during active game with 2+ players)
  const cmdDmgHtml = (!isEnded && s.players.length > 1) ? `
    <div class="cmd-dmg-box">
      <div class="cmd-dmg-title">Commander Damage</div>
      ${s.players.map(victim => {
        const attackers = s.players.filter(atk => atk.id !== victim.id);
        return `<div class="cmd-dmg-row">
          <div class="cmd-dmg-victim">${escHtml(victim.name)}</div>
          <div class="cmd-dmg-sources">
            ${attackers.map(atk => {
              const dmg = (victim.commanderDamage || {})[atk.id] || 0;
              const atkIdx = s.players.findIndex(p => p.id === atk.id);
              const col = SESSION_COLORS[atkIdx % SESSION_COLORS.length];
              return `<div class="cmd-dmg-cell">
                <button class="cmd-btn life-btn-minus" onclick="updateCmdDmg('${victim.id}','${atk.id}',-1)" ${dmg===0?'disabled':''}>−</button>
                <div class="cmd-dmg-cell-val" style="color:${dmg>=21?'var(--tier-s)':col}">${dmg}</div>
                <button class="cmd-btn life-btn-plus" onclick="updateCmdDmg('${victim.id}','${atk.id}',1)">+</button>
                <span class="cmd-dmg-cell-label">${escHtml(atk.name.slice(0,3))}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>` : '';

  const winnerDeck = isEnded && s.winnerId ? state.decks.find(d => d.id === s.winnerId) : null;

  return `<div style="margin-bottom:20px">
    <div class="session-header">
      <div>
        <div style="font-size:17px;font-weight:600;margin-bottom:2px">${isEnded ? '🏆 Game Over' : '⚔ Live Session'}</div>
        <div style="font-size:12px;color:var(--text-muted)">${s.players.length} players · Code: <span style="font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:1px">${s.id}</span></div>
      </div>
      ${isEnded
        ? `<button onclick="clearSession()" style="font-size:12px;padding:6px 14px">Close</button>`
        : `<button onclick="openEndGameModal()" style="font-size:12px;padding:6px 14px;color:var(--tier-s-text);border-color:var(--tier-s)">End Game</button>`}
    </div>
    ${isEnded && winnerDeck ? `<div class="dash-card" style="padding:12px 16px;margin-bottom:16px;border-color:var(--tier-a);background:var(--tier-a-bg)">
      <span style="font-weight:600;color:var(--tier-a-text)">🏆 ${escHtml(winnerDeck.commander)}</span>
      <span style="color:var(--text-muted);font-size:12px;margin-left:8px">${escHtml(winnerDeck.player)} wins · results logged</span>
    </div>` : ''}
    ${isEnded && !winnerDeck && s.status === 'ended' ? `<div class="dash-card" style="padding:12px 16px;margin-bottom:16px">
      <span style="color:var(--text-secondary);font-size:13px">Game ended · no winner declared</span>
    </div>` : ''}
    <div class="life-grid" style="grid-template-columns:repeat(${gridCols},1fr)">${lifeTiles}</div>
    ${cmdDmgHtml}
  </div>`;
}
