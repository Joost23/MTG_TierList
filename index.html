<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #0C0B0F;
  --bg-card: #16151A;
  --bg-hover: #1C1B22;
  --bg-surface: #1F1E25;
  --border: #2A2930;
  --border-hover: #3A394A;
  --text: #E8E6EF;
  --text-secondary: #9896A3;
  --text-muted: #5E5C6B;
  --accent: #A78BFA;
  --accent-dim: #7C5FC7;
  --tier-s: #E24B4A;
  --tier-s-bg: #2A1414;
  --tier-s-text: #F5A5A4;
  --tier-a: #EF9F27;
  --tier-a-bg: #2A2010;
  --tier-a-text: #F5D08A;
  --tier-b: #1D9E75;
  --tier-b-bg: #0D2A1F;
  --tier-b-text: #7EDDBC;
  --tier-c: #378ADD;
  --tier-c-bg: #0D1E2A;
  --tier-c-text: #8FC5F0;
  --tier-d: #888780;
  --tier-d-bg: #1A1A18;
  --tier-d-text: #B5B4AD;
  --player-joost: #A78BFA;
  --player-joost-bg: #1E1835;
  --player-willem: #34D399;
  --player-willem-bg: #0D2A1F;
  --player-josh: #FBBF24;
  --player-josh-bg: #2A2010;
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
}
html { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; background: var(--bg); }
button { font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); border-radius: var(--radius-sm); transition: all var(--transition); }
button:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border-hover); }
button.active { background: var(--bg-surface); color: var(--text); border-color: var(--accent-dim); }
input, textarea, select { font-family: inherit; background: var(--bg-card); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 14px; transition: border-color var(--transition); outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent-dim); }

.app { max-width: 760px; margin: 0 auto; padding: 24px 20px 80px; }

/* User bar */
.user-bar { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 10px; font-size: 12px; color: var(--text-muted); }
.user-bar button { font-size: 11px; padding: 3px 10px; }

/* Header */
.header { margin-bottom: 24px; position: relative; }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.header h1 span { color: var(--accent); }
.header p { font-size: 14px; color: var(--text-secondary); }
.header-glow { position: absolute; top: -60px; left: -40px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%); pointer-events: none; }

/* Pod Stats */
.pod-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
.pod-stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; transition: border-color var(--transition); }
.pod-stat:hover { border-color: var(--border-hover); }
.pod-stat-name { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.pod-stat-value { font-size: 26px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.pod-stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* Controls */
.controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.control-group { display: flex; gap: 2px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 2px; }
.control-group button { border: none; background: transparent; padding: 5px 12px; font-size: 12px; border-radius: 4px; }
.control-group button.active { background: var(--bg-surface); color: var(--text); }
.control-group button:hover:not(.active) { background: var(--bg-hover); }
.spacer { flex: 1; }

/* Search & filter bar */
.deck-search-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.deck-search-input { flex: 1; min-width: 0; font-size: 13px; padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); }
.deck-search-input:focus { outline: none; border-color: var(--accent); }
.deck-filter-select { font-size: 12px; padding: 5px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); cursor: pointer; max-width: 140px; }
.deck-filter-select:focus { outline: none; border-color: var(--accent); }

/* Tier bar — sticky + clickable */
.tier-bar-wrap { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 6px 0 10px; margin-bottom: 8px; }
.tier-bar { display: flex; gap: 2px; border-radius: var(--radius-sm); overflow: hidden; }
.tier-bar-seg { flex: 1; text-align: center; padding: 7px 0; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; transition: filter 0.15s; }
.tier-bar-seg.clickable { cursor: pointer; }
.tier-bar-seg.clickable:hover { filter: brightness(1.15); }
.tier-bar-seg.dimmed { opacity: 0.35; }

/* Tier sections */
.tier-section { margin-bottom: 20px; }
.tier-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding-left: 2px; cursor: pointer; user-select: none; }
.tier-header:hover .tier-chevron { color: var(--text-secondary); }
.tier-badge { width: 26px; height: 26px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.tier-label { font-size: 13px; font-weight: 500; }
.tier-count { font-size: 12px; color: var(--text-muted); }
.tier-chevron { margin-left: auto; font-size: 13px; color: var(--text-muted); transition: transform 0.2s ease; }
.tier-chevron.collapsed { transform: rotate(-90deg); }

/* Deck list — compact rows */
.deck-list { display: flex; flex-direction: column; gap: 4px; }
.deck-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: background var(--transition), border-color var(--transition); border-left: 3px solid transparent; position: relative; overflow: hidden; }
.deck-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
.deck-card-art { position: absolute; inset: 0; background-size: cover; background-position: center 15%; opacity: 0; transition: opacity 0.3s ease; z-index: 0; }
.deck-card-art.loaded { opacity: 0.12; }
.deck-card:hover .deck-card-art.loaded { opacity: 0.22; }
.deck-card > *:not(.deck-card-art) { position: relative; z-index: 1; }
.deck-row-compact { display: flex; align-items: center; gap: 10px; padding: 0 12px; min-height: 44px; }
.deck-tier-mini { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
.deck-commander { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.deck-name-stack { display: flex; flex-direction: column; flex: 1; min-width: 0; overflow: hidden; }
.deck-card-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-commander-sub { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gallery-card-deckname { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
.deck-player { padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
.deck-row-score { font-size: 14px; font-weight: 600; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; width: 34px; text-align: right; color: var(--text-secondary); }
.deck-colors { display: inline-flex; align-items: center; gap: 2px; }
.deck-record-badge { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
/* Legacy compat */
.deck-top { display: none; }
.deck-score { display: none; }
.deck-info { display: none; }
.deck-name-row { display: none; }
.deck-meta { display: none; }
.deck-score-value { display: none; }
.deck-score-label { display: none; }

/* Expanded area */
.deck-expanded { padding: 10px 12px 12px; border-top: 1px solid var(--border); }
.stat-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 8px; }
.stat-label { width: 95px; color: var(--text-secondary); flex-shrink: 0; }
.stat-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.stat-value { width: 30px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
.deck-notes { font-size: 13px; color: var(--text-secondary); margin-top: 10px; line-height: 1.6; font-style: italic; border-left: 2px solid var(--border); padding-left: 10px; }
.deck-actions { display: flex; gap: 8px; margin-top: 10px; }
.deck-actions button { font-size: 12px; padding: 5px 14px; }
.btn-danger { color: var(--tier-s) !important; }
.btn-danger:hover { background: var(--tier-s-bg) !important; border-color: var(--tier-s) !important; }

/* Win/Loss record */
.record-section { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius-sm); }
.record-stat { display: flex; flex-direction: column; align-items: center; min-width: 36px; }
.record-stat-value { font-size: 17px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.record-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.4px; }
.record-divider { width: 1px; height: 30px; background: var(--border); margin: 0 2px; }
.record-rate { font-size: 13px; color: var(--text-secondary); margin-left: 4px; }
.record-btns { display: flex; gap: 6px; margin-left: auto; }
.btn-win { font-size: 12px !important; padding: 4px 12px !important; color: var(--tier-b-text) !important; border-color: var(--tier-b) !important; }
.btn-win:hover { background: var(--tier-b-bg) !important; }
.btn-loss { font-size: 12px !important; padding: 4px 12px !important; color: var(--tier-s-text) !important; border-color: var(--tier-s) !important; }
.btn-loss:hover { background: var(--tier-s-bg) !important; }
.deck-record-badge { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.log-game-form { margin-top: 10px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.log-game-btns { display: flex; gap: 6px; }
.deck-card:has(.log-game-form) { position: relative; z-index: 10; }
.autocomplete-wrap { position: relative; flex: 1; min-width: 160px; }
.autocomplete-wrap input[type="text"] { width: 100%; font-size: 13px; }
.autocomplete-list { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: var(--bg-surface); border: 1px solid var(--border-hover); border-radius: var(--radius-sm); z-index: 20; max-height: 200px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.autocomplete-item { padding: 7px 10px; font-size: 13px; cursor: pointer; }
.autocomplete-item:hover, .autocomplete-item.active { background: var(--bg-hover); }
.game-history { margin-top: 10px; }
.game-history-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.game-entry { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.game-entry:last-child { border-bottom: none; }
.game-result-badge { font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }
.game-result-win { background: var(--tier-b-bg); color: var(--tier-b-text); }
.game-result-loss { background: var(--tier-s-bg); color: var(--tier-s-text); }
.game-opponent { flex: 1; color: var(--text-secondary); }
.game-date { font-size: 11px; color: var(--text-muted); }
.game-remove { font-size: 13px; color: var(--text-muted); background: none !important; border: none !important; padding: 0 4px !important; line-height: 1; }
.game-remove:hover { color: var(--tier-s-text) !important; background: none !important; }

/* Deck detail page */
.deck-detail { padding: 20px 0 40px; }
.deck-detail-topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
.deck-detail-back { font-size: 13px; padding: 6px 14px; flex-shrink: 0; }
.deck-detail-title { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; flex-wrap: wrap; }
.deck-detail-title h2 { font-size: 20px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-detail-import-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.deck-detail-import-panel input[type="text"] { flex: 1; min-width: 200px; font-size: 13px; }
.dl-import-status { font-size: 12px; color: var(--text-muted); font-style: italic; }
.dl-import-success { color: var(--tier-b-text) !important; font-style: normal !important; font-weight: 500; }
.dl-import-error { color: var(--tier-s-text) !important; font-style: normal !important; }
.deck-detail-editor-wrap { margin-bottom: 16px; }
.dl-edit-toggle { font-size: 12px; padding: 5px 12px; color: var(--text-secondary); }
.deck-detail-editor { display: block; width: 100%; min-height: 200px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; resize: vertical; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 8px; box-sizing: border-box; }
.dl-display { margin-top: 4px; }
/* Image grid */
.dl-image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(146px, 1fr)); gap: 10px; }
.dl-card-img-wrap { position: relative; border-radius: 8px; overflow: hidden; background: var(--bg-card); border: 1px solid var(--border); aspect-ratio: 63 / 88; cursor: pointer; }
.dl-card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s ease; }
.dl-card-img-wrap:hover img { transform: scale(1.04); }
/* Card popup */
.card-popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease; }
.card-popup-inner { position: relative; max-width: min(380px, 90vw); width: 100%; }
.card-popup-inner img { width: 100%; border-radius: 16px; box-shadow: 0 24px 64px rgba(0,0,0,0.8); display: block; }
.card-popup-name { text-align: center; color: #fff; font-size: 15px; font-weight: 600; margin-top: 12px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
.card-popup-close { position: absolute; top: -12px; right: -12px; width: 32px; height: 32px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text); font-size: 18px; line-height: 32px; text-align: center; cursor: pointer; }
.dl-card-qty-badge { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.8); color: #fff; font-size: 11px; font-family: 'JetBrains Mono', monospace; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
.dl-card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); text-align: center; padding: 8px; }
/* Text list */
.dl-text-list { display: flex; flex-direction: column; gap: 20px; }
.dl-group-header { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.dl-section-header { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
.dl-group-count { font-family: 'JetBrains Mono', monospace; }
.dl-group-entries { display: flex; flex-direction: column; }
.dl-entry { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 13px; border-bottom: 1px solid rgba(42,41,48,0.5); }
.dl-entry:last-child { border-bottom: none; }
.dl-entry-qty { width: 18px; text-align: right; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; flex-shrink: 0; }
.dl-entry-name { flex: 1; }
.dl-entry-cost { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
@media (max-width: 400px) { .dl-image-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
.empty h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.empty button { margin-top: 12px; padding: 8px 20px; font-size: 13px; }

/* Footer */
.footer { margin-top: 32px; display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.footer-info { flex: 1; min-width: 240px; padding: 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.footer-info strong { color: var(--text); font-weight: 500; }
.footer button { font-size: 11px; padding: 8px 14px; }

/* Modal overlay */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.2s ease; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.3s ease; }
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-field input, .modal-field textarea, .modal-field select { width: 100%; }
.modal-field textarea { min-height: 70px; resize: vertical; }
.modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-actions button { padding: 8px 20px; font-size: 13px; }
.btn-primary { background: var(--accent-dim) !important; color: #fff !important; border-color: var(--accent) !important; }
.btn-primary:hover { background: var(--accent) !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes progress-pulse { 0%,100% { opacity:0.4; transform:scaleX(0.7); transform-origin:left; } 50% { opacity:1; transform:scaleX(1); transform-origin:left; } }

@media (max-width: 600px) {
  .app { padding: 16px 14px 60px; }
  .header h1 { font-size: 22px; }
  .pod-stats { grid-template-columns: 1fr; }
  .controls { gap: 4px; }
  .modal { padding: 20px; }
  .modal-row { grid-template-columns: 1fr; }
}

/* ===== TABS ===== */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 58px; background: var(--bg-card); border-top: 1px solid var(--border); display: flex; z-index: 50; max-width: 100%; }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none !important; background: transparent !important; color: var(--text-muted) !important; font-size: 10px; padding: 8px 0; border-radius: 0 !important; }
.tab-btn.active { color: var(--accent) !important; }
.tab-btn:hover:not(.active) { background: var(--bg-hover) !important; color: var(--text) !important; }
.tab-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* ===== DASHBOARD ===== */
.dashboard-greeting { margin-bottom: 24px; }
.greeting-text { font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
.greeting-sub { font-size: 13px; color: var(--text-secondary); }
.dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
.dash-stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.dash-stat-card:hover { border-color: var(--border-hover); }
.dash-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.dash-stat-value { font-size: 22px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.dash-section-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; font-weight: 500; }

@media (max-width: 600px) { .dash-stats { grid-template-columns: repeat(3,1fr); gap: 6px; } .dash-stat-value { font-size: 18px; } .greeting-text { font-size: 22px; } }

/* ===== PHASE 3: STATS ===== */
.dl-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
@media (max-width: 520px) { .dl-stats-grid { grid-template-columns: 1fr; } }
.dl-stat-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.dl-stat-box-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; font-weight: 500; }
.mana-curve { display: flex; align-items: flex-end; gap: 3px; height: 64px; }
.mana-col { display: flex; flex-direction: column; align-items: center; flex: 1; }

.type-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }

.type-row-count { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; width: 18px; text-align: right; }
.color-pips { display: flex; gap: 8px; flex-wrap: wrap; }
.color-pip { display: flex; flex-direction: column; align-items: center; gap: 3px; }

.color-pip-val { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
/* Changelog */
.changelog-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.changelog-list { display: flex; flex-direction: column; gap: 0; }
.changelog-entry { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.changelog-entry:last-child { border-bottom: none; }
.changelog-date { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; width: 82px; flex-shrink: 0; padding-top: 1px; }
.changelog-body { flex: 1; min-width: 0; }
.changelog-in { font-size: 12px; color: var(--tier-b-text); line-height: 1.5; }
.changelog-out { font-size: 12px; color: var(--tier-s-text); line-height: 1.5; }
.changelog-note { font-size: 12px; color: var(--text-secondary); font-style: italic; margin-top: 3px; }
.changelog-remove { font-size: 12px; color: var(--text-muted); background: none !important; border: none !important; padding: 2px 4px !important; flex-shrink: 0; }
.changelog-remove:hover { color: var(--tier-s-text) !important; }
.changelog-empty { font-size: 13px; color: var(--text-muted); padding: 8px 0; }
/* ===== GAME SESSION ===== */
.life-grid { display: grid; gap: 12px; margin-bottom: 20px; }
.life-tile { background: var(--bg-card); border: 2px solid transparent; border-radius: 14px; padding: 18px 14px 14px; text-align: center; }
.life-tile-name { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 2px; }

.cmd-dmg-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; }

.cmd-dmg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.cmd-dmg-row:last-child { margin-bottom: 0; }
.cmd-dmg-victim { font-size: 12px; width: 86px; flex-shrink: 0; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cmd-dmg-sources { display: flex; gap: 12px; flex-wrap: wrap; }
.cmd-dmg-cell { display: flex; align-items: center; gap: 3px; }
.cmd-dmg-cell-label { font-size: 10px; color: var(--text-muted); }
.cmd-dmg-cell-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; min-width: 18px; text-align: center; }
.cmd-btn { width: 20px; height: 20px; font-size: 10px; padding: 0; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
.session-setup-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.join-session-bar { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
/* ===== MULTIPLAYER PLAYTESTER ===== */
.pt-playmat { position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);z-index:200;overflow:hidden; }
.pt-tabs { display:flex;overflow-x:auto;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none; }

.pt-tab { display:flex;align-items:center;gap:4px;padding:0 10px;height:36px;border:none;border-radius:0;border-right:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;flex-shrink:0;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap; }
.pt-tab-active { color:var(--tab-col,var(--accent));border-bottom-color:var(--tab-col,var(--accent));background:var(--bg-surface); }

.pt-tab-name { font-size:11px;font-weight:600;letter-spacing:0.3px; }
.pt-tab-life { font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace; }

.pt-tabs-info { padding:0 8px;font-size:10px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;align-self:center; }
.pt-inline-phases { display:flex;align-items:center;gap:0;overflow-x:auto;flex:1;min-width:0;padding:0 4px;scrollbar-width:none; }

.pt-pass-turn-btn { font-size:9px;padding:2px 7px;border-radius:99px;border:1px solid var(--accent-dim);background:transparent;color:var(--accent);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.12s;margin-right:4px; }
.pt-pass-turn-btn:hover { background:var(--accent);color:#fff; }
.pt-battlefield { flex:1;position:relative;overflow:hidden;background:#090811;cursor:grab;touch-action:none; }
.pt-battlefield.pt-panning { cursor:grabbing; }
.pt-battlefield-canvas { position:absolute;top:0;left:0;width:4000px;height:4000px;transform-origin:0 0; }
.pt-drop-highlight { outline:2px dashed var(--accent);background:rgba(167,139,250,0.04) !important; }
.pt-zone-sidebar { position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:10; }
.pt-zone-panel { width:58px;cursor:pointer;border-radius:6px;background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.1);overflow:hidden;transition:border-color 0.12s,transform 0.12s;backdrop-filter:blur(4px);flex-shrink:0; }
.pt-zone-panel:hover,.pt-zone-panel.pt-drop-hover { border-color:var(--accent);transform:scale(1.06); }

.pt-zone-panel-label { font-size:9px;text-align:center;color:var(--text-muted);padding:2px 0 3px;text-transform:uppercase;letter-spacing:0.4px; }
.pt-zone-panel-empty { width:100%;aspect-ratio:63/88;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,0.03); }
.pt-zone-card-back { width:100%;aspect-ratio:63/88;background:linear-gradient(135deg,#1a1535 0%,#2d1f5e 50%,#0d0b1a 100%);display:block; }
.pt-zone-life-btn { font-size:11px;padding:4px 0;background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.1);border-radius:4px;cursor:pointer;width:100%;transition:border-color 0.12s;backdrop-filter:blur(4px); }
.pt-zone-life-btn:hover { border-color:var(--border-hover); }
.pt-battlefield.pt-drop-active .pt-battlefield-canvas { outline:2px dashed var(--accent);outline-offset:-2px;background:rgba(167,139,250,0.04); }
.pt-lib-search { padding:10px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0; }
.pt-lib-type-filters { display:flex;gap:4px;flex-wrap:wrap;margin-top:6px; }
.pt-lib-type-btn { font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.1s; }
.pt-lib-type-btn.active { background:var(--accent);color:#fff;border-color:var(--accent); }
/* Mulligan overlay */
.pt-mull-overlay { position:fixed;inset:0;background:rgba(8,6,20,0.96);z-index:600;display:flex;flex-direction:column;align-items:center;padding:16px 12px;gap:14px;overflow-y:auto;backdrop-filter:blur(6px); }
.pt-mull-header { text-align:center;flex-shrink:0; }

.pt-mull-sub { font-size:12px;color:var(--text-muted); }

.pt-mull-card { position:relative;cursor:pointer;border-radius:8px;border:2px solid transparent;transition:border-color 0.12s,transform 0.12s,opacity 0.12s; }
.pt-mull-card:hover { transform:translateY(-4px); }
.pt-mull-card.selected { border-color:var(--tier-s-text);opacity:0.45; }
.pt-mull-card img { width:100px;border-radius:6px;display:block; }
.pt-mull-card-back { width:100px;height:140px;background:linear-gradient(135deg,#1a1535,#2d1f5e,#0d0b1a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);text-align:center;padding:6px; }
.pt-mull-bottom-zone { border:2px dashed var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);max-width:900px;width:100%;min-height:72px;flex-shrink:0; }
.pt-mull-bottom-zone.ready { border-color:var(--accent); }
.pt-mull-bottom-zone-label { font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;width:100%;text-align:center; }
.pt-mull-bottom-card img { width:52px;border-radius:4px;display:block; }
.pt-mull-bottom-card-back { width:52px;height:73px;background:linear-gradient(135deg,#1a1535,#2d1f5e,#0d0b1a);border-radius:4px; }
.pt-mull-actions { display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;justify-content:center;align-items:center; }
.pt-mull-type-row { display:flex;gap:6px;flex-wrap:wrap;justify-content:center;flex-shrink:0;padding:4px 0; }
.pt-mull-type-btn { font-size:11px;padding:4px 12px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.1s; }
.pt-mull-type-btn.active { background:var(--accent);color:#fff;border-color:var(--accent); }
.pt-mull-waiting { background:rgba(0,0,0,0.5);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;color:var(--text-muted);text-align:center;max-width:540px;width:100%;flex-shrink:0; }
/* Stack panel — right side, above zone sidebar */
.pt-stack-panel { position:absolute;top:8px;right:74px;min-width:190px;max-width:240px;z-index:20;display:flex;flex-direction:column;gap:4px;pointer-events:auto; }
.pt-stack-header { font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);text-align:center;padding:3px 0 5px;font-weight:700; }
.pt-stack-item { display:flex;align-items:center;gap:9px;background:rgba(0,0,0,0.88);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;backdrop-filter:blur(8px);transition:border-color 0.12s;cursor:pointer; }

.pt-stack-item-back { width:48px;height:67px;border-radius:4px;background:linear-gradient(135deg,#1a1535,#0d0b1a);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-muted);text-align:center;padding:3px; }
.pt-stack-item-info { flex:1;min-width:0; }
.pt-stack-item-name { font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text); }

.pt-stack-resolve-btn { background:rgba(167,139,250,0.15);border:1px solid var(--accent-dim);color:var(--accent); }
.pt-stack-resolve-btn:hover { background:var(--accent);color:#fff;border-color:var(--accent); }
.pt-stack-counter-btn { background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.35);color:var(--tier-s-text); }
.pt-stack-counter-btn:hover { background:var(--tier-s-text);color:#fff;border-color:var(--tier-s-text); }
/* Priority bar (large Take Action / Decline above hand) */
.pt-priority-bar { display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(10,8,22,0.96);border-top:2px solid var(--accent);flex-shrink:0;backdrop-filter:blur(10px);flex-wrap:wrap; }
.pt-priority-bar-waiting { border-top-color:var(--border);opacity:0.8; }

.pt-priority-cardname-dim { font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1; }
.pt-priority-tally { font-size:10px;color:var(--text-muted); }
.pt-priority-waiting-icon { font-size:16px; }
.pt-priority-btns { display:flex;gap:8px;flex-shrink:0; }
.pt-priority-take-btn { font-size:13px;font-weight:700;padding:9px 18px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;cursor:pointer;transition:opacity 0.12s;font-family:inherit;white-space:nowrap; }
.pt-priority-take-btn:hover { opacity:0.85; }
.pt-priority-decline-btn { font-size:13px;font-weight:600;padding:9px 16px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.06);color:var(--text-muted);border:1px solid var(--border);cursor:pointer;transition:background 0.12s;font-family:inherit;white-space:nowrap; }
.pt-priority-decline-btn:hover { background:rgba(255,255,255,0.14); }
.pt-priority-waiting { font-size:12px;color:var(--text-muted);text-align:center;flex:1;font-style:italic;padding:8px 0; }
/* Phase stop indicator */
.pt-phase-step.stop { border-color:var(--accent-dim);color:var(--accent); }
/* Cleanup discard overlay */
.pt-discard-overlay { position:fixed;inset:0;background:rgba(8,6,20,0.96);z-index:600;display:flex;flex-direction:column;align-items:center;padding:20px 12px;gap:14px;backdrop-filter:blur(6px); }
.pt-discard-title { font-size:18px;font-weight:700;color:var(--tier-s-text);margin-bottom:4px;text-align:center; }

.pt-discard-card:hover { border-color:var(--tier-s-text);transform:translateY(-4px); }
.pt-discard-card img { width:88px;border-radius:6px;display:block; }
.pt-discard-card-back { width:88px;height:123px;background:linear-gradient(135deg,#1a1535,#2d1f5e,#0d0b1a);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);text-align:center;padding:6px; }
.pt-phase-step { font-size:10px;padding:2px 5px;border-radius:99px;color:var(--text-muted);white-space:nowrap;border:1px solid transparent;transition:all 0.12s;flex-shrink:0; }
.pt-phase-step.active { background:var(--accent-dim);color:var(--accent);border-color:var(--accent-dim);font-weight:700; }
.pt-phase-step.past { opacity:0.35; }
.pt-phase-step.clickable { cursor:pointer; }
.pt-phase-step.clickable:hover { background:var(--accent);color:#fff;border-color:var(--accent); }
.pt-phase-sep { color:var(--border);font-size:9px;padding:0 1px;flex-shrink:0;opacity:0.5; }
/* Priority indicator on player tab */
.pt-tab.pt-tab-priority { outline:2px solid var(--accent);outline-offset:1px;box-shadow:0 0 10px rgba(167,139,250,0.4); }
/* Pass button emphasis */
.pt-action-btn.pt-action-pass { background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700; }
.pt-action-btn.pt-action-pass:hover { background:var(--accent-dim); }
.pt-action-btn.pt-hold-active { background:rgba(251,191,36,0.15);color:rgb(251,191,36);border-color:rgba(251,191,36,0.5); }
.pt-action-btn.pt-hold-active:hover { background:rgba(251,191,36,0.3); }
.pt-mana-pool { display:flex;align-items:center;gap:3px;padding:3px 6px;background:rgba(0,0,0,0.35);border-radius:20px;flex-shrink:0; }
.pt-mana-pip { display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:800;cursor:pointer;user-select:none;border:1.5px solid rgba(0,0,0,0.4);transition:transform 0.1s;flex-shrink:0; }

/* Battlefield hover: two-stage (JS-driven, mouse only) */

.pt-card-selected { outline:2px solid var(--accent);outline-offset:2px; }
.pt-card-back { width:72px;height:100px;background:linear-gradient(135deg,#1a1535,#0d0b1a);border:1px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-muted);text-align:center;padding:4px;word-break:break-word; }
.pt-hand-card-back { width:90px;height:126px;background:linear-gradient(135deg,#1a1535,#0d0b1a);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-muted);text-align:center;padding:6px;word-break:break-word; }
.pt-counter { position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;background:#fbbf24;color:#000;border-radius:99px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;pointer-events:none;letter-spacing:-0.3px; }
.pt-stat-line { position:absolute;bottom:5px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800;color:#fff;display:flex;align-items:center;pointer-events:none;white-space:nowrap;letter-spacing:0.2px; }

.pt-loyalty-badge { position:absolute;bottom:5px;right:4px;min-width:20px;height:20px;background:#3b6fd4;color:#fff;border-radius:4px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;pointer-events:none;padding:0 3px; }
.pt-cmd-badge { position:absolute;bottom:-4px;left:2px;font-size:9px;background:rgba(167,139,250,0.8);border-radius:99px;padding:1px 4px;color:#fff;pointer-events:none; }
.pt-snap-badge { position:absolute;top:8px;left:8px;font-size:9px;padding:3px 7px;background:rgba(0,0,0,0.6);border:1px solid var(--border);border-radius:99px;color:var(--text-muted);cursor:pointer;z-index:10;backdrop-filter:blur(4px); }
.pt-action-bar { display:flex;gap:4px;padding:4px 8px;background:var(--bg-card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none; }

.pt-stack-take-btn { flex:1;padding:9px 10px;font-size:13px;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:opacity 0.12s; }
.pt-stack-take-btn:hover { opacity:0.85; }
.pt-stack-decline-btn { flex:1;padding:9px 10px;font-size:13px;font-weight:600;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:background 0.12s; }

/* Turn transition banner */

@keyframes turnFade { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.88)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1)} 70%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(1)} }
/* Cast → Stack toast */
.pt-cast-toast { position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);border:1px solid var(--accent-dim);border-radius:var(--radius-sm);padding:6px 14px;z-index:340;pointer-events:none;animation:turnFade 1.2s ease forwards;backdrop-filter:blur(6px);text-align:center;white-space:nowrap; }

.pt-turn-banner-name { font-size:17px;font-weight:700;color:var(--accent);margin-bottom:3px; }
.pt-turn-banner-sub { font-size:11px;color:var(--text-muted); }
.pt-action-danger { color:var(--tier-s-text) !important;border-color:rgba(226,75,74,0.5) !important; }
.pt-hand-wrap { position:relative;flex-shrink:0;width:100%; }
.pt-hand { display:flex;gap:3px;padding:6px 8px 8px;background:transparent;border:none;overflow:visible;flex-shrink:0;min-height:110px;max-height:130px;scrollbar-width:none;justify-content:center; }
.pt-hand.fan-mode { gap:0; }
.pt-hand-card { flex-shrink:0;cursor:grab;border-radius:6px;transition:transform 0.16s cubic-bezier(0.34,1.56,0.64,1),margin-left 0.12s ease;touch-action:none;user-select:none;position:relative; }
.pt-hand.fan-mode .pt-hand-card.pt-hand-active { margin-left:8px !important;margin-right:8px; }
.pt-hand-card.pt-dragging-src { opacity:0.3; }
.pt-hand-card.pt-hand-reorder-target::before { content:'';position:absolute;left:-3px;top:0;bottom:0;width:3px;background:var(--accent);border-radius:2px;z-index:5; }

.pt-hand-badge { position:absolute;top:-8px;left:8px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;font-family:'JetBrains Mono',monospace;z-index:10;pointer-events:none; }
.pt-hand-expand-btn { position:absolute;top:-22px;right:6px;font-size:10px;padding:2px 8px;background:rgba(0,0,0,0.7);border:1px solid var(--border);border-radius:99px;color:var(--text-muted);cursor:pointer;z-index:10; }
/* Hand expanded overlay */
.pt-hand-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:550;display:flex;flex-direction:column;overscroll-behavior:contain; }
.pt-hand-overlay-header { display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0; }

.pt-hand-overlay-card { cursor:pointer;border-radius:8px;overflow:hidden;position:relative;border:2px solid transparent;transition:border-color 0.12s,transform 0.12s;background:var(--bg-surface); }
.pt-hand-overlay-card:hover,.pt-hand-overlay-card:active { border-color:var(--accent);transform:scale(1.04); }
/* Token badge on battlefield */
.pt-token-badge { position:absolute;top:-4px;right:-4px;background:var(--tier-a);color:#fff;font-size:8px;font-weight:700;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;border:1px solid var(--bg-card); }
/* Token panel */
.pt-token-panel { position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:550;display:flex;align-items:flex-end; }
.pt-token-panel-inner { width:100%;max-height:85vh;background:var(--bg-card);border-radius:18px 18px 0 0;display:flex;flex-direction:column; }
.pt-token-panel-header { display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0; }

.pt-token-panel-body { overflow-y:auto;flex:1; }
.pt-token-panel-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;padding:14px; }
.pt-token-tile { cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;transition:border-color 0.12s,transform 0.12s;background:var(--bg-surface);display:flex;flex-direction:column; }
.pt-token-tile:hover,.pt-token-tile:active { border-color:var(--accent);transform:scale(1.04); }

.pt-token-tile-placeholder { width:100%;aspect-ratio:63/88;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);padding:6px;text-align:center; }
.pt-token-tile-label { font-size:10px;color:var(--text-secondary);text-align:center;padding:4px 4px 5px;line-height:1.3;background:var(--bg-surface); }

.pt-token-custom-title { font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px; }

.pt-token-qty-row { display:flex;gap:6px;align-items:center; }
.pt-token-qty-btn { font-size:12px;padding:5px 10px;border-radius:var(--radius-sm); }
.pt-token-qty-btn.active { background:var(--accent);color:#fff;border-color:var(--accent); }
.pt-card-menu { position:fixed;background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--radius);padding:8px;z-index:500;min-width:210px;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.6); }
.pt-card-menu-name { font-size:11px;color:var(--text-muted);padding:0 6px 8px;border-bottom:1px solid var(--border);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic; }
.pt-menu-btn { display:block;width:100%;text-align:left;padding:8px 10px;font-size:13px;border:none;background:transparent;color:var(--text);border-radius:var(--radius-sm);cursor:pointer; }
.pt-menu-btn:hover { background:var(--bg-hover); }
.pt-menu-cancel { color:var(--text-muted);border-top:1px solid var(--border);margin-top:4px;padding-top:8px; }
#pt-card-zoom { position:fixed;pointer-events:none;z-index:9999;border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,0.75);opacity:0;transform:scale(0.88) translateY(6px);transition:opacity 0.12s ease,transform 0.12s ease;display:none; }
#pt-card-zoom.visible { opacity:1;transform:scale(1) translateY(0); }

.pt-settings-popover { position:fixed;background:var(--bg-card);border:1px solid var(--border-hover);border-radius:var(--radius);padding:12px 14px;z-index:500;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,0.6);animation:ptFadeSlide 0.15s ease; }
.pt-settings-popover label { display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;padding:4px 0;color:var(--text-secondary); }
.pt-settings-row { display:flex;gap:6px;margin-bottom:10px; }
.pt-settings-divider { border:none;border-top:1px solid var(--border);margin:8px 0; }
.pt-size-btn { flex:1;font-size:12px;padding:5px 0;border-radius:var(--radius-sm);text-align:center; }
.pt-size-btn.active { background:var(--accent);color:#fff;border-color:var(--accent); }
@keyframes ptFadeSlide { from { opacity:0;transform:translateY(6px) } to { opacity:1;transform:translateY(0) } }
.pt-overlay-bg { position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:flex;align-items:flex-end; }
.pt-overlay { width:100%;max-height:72vh;background:var(--bg-card);border-radius:18px 18px 0 0;display:flex;flex-direction:column; }
.pt-overlay-header { display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0; }
.pt-overlay-title { font-weight:600;font-size:14px; }
.pt-overlay-cards { display:flex;gap:10px;padding:14px;overflow-y:auto;align-items:flex-start;scrollbar-width:none;flex-wrap:wrap;flex:1; }
.pt-overlay-cards::-webkit-scrollbar { display:none; }
.pt-overlay-card { display:flex;flex-direction:column;align-items:center;gap:5px; }
.pt-overlay-card-btn { font-size:10px;padding:3px 8px;border-radius:99px; }
.pt-mill-toast { position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;z-index:600;max-width:90%;backdrop-filter:blur(8px);animation:pt-toast-in 0.2s ease; }

.pt-mill-toast-card { font-size:11px;color:var(--text);background:var(--bg-surface);padding:2px 8px;border-radius:99px;border:1px solid var(--border); }
.pt-scry-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:400;display:flex;flex-direction:column; }
.pt-scry-header { display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0; }

.pt-scry-card.scry-bottom { outline:2px solid var(--tier-s);opacity:0.7; }

.pt-player-row { display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border); }
.pt-player-row:last-child { border-bottom:none; }
.pt-comeback-banner { display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--bg-card);border:1px solid var(--accent-dim);border-radius:var(--radius);margin-bottom:16px; }
.pt-sessions-list { display:flex;flex-direction:column;gap:8px; }
.pt-session-row { display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);transition:border-color var(--transition); }

.pt-session-active  { background:var(--tier-a-bg);color:var(--tier-a-text); }
@keyframes pt-toast-in { from { opacity:0;transform:translateX(-50%) translateY(10px); } to { opacity:1;transform:translateX(-50%) translateY(0); } }
@keyframes pt-card-land { from { transform:scale(1.08); } to { transform:scale(1); } }
.pt-card-land { animation:pt-card-land 0.2s ease-out; }
/* ===== RECOMMENDATIONS ===== */
.rec-card { display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s; }
.rec-card:last-child { border-bottom:none; }

/* ===== PHASE 5 POLISH ===== */

.streak-win { background:var(--tier-b-bg);color:var(--tier-b-text); }
.streak-loss { background:var(--tier-s-bg);color:var(--tier-s-text); }

.avatar-circle:hover { transform:scale(1.1); }

.avatar-option:hover,.avatar-option.selected { border-color:var(--accent);background:var(--bg-hover); }
.spotlight-banner { position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:16px;min-height:172px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer; }
.spotlight-bg { position:absolute;inset:0;background-size:cover;background-position:center 20%; }
.spotlight-overlay { position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.60) 50%,rgba(0,0,0,0.25) 100%); }
.spotlight-content { position:relative;z-index:1;padding:18px 20px 16px; }
.activity-entry { display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);align-items:flex-start; }
.activity-entry:last-child { border-bottom:none; }
.activity-icon { font-size:15px;flex-shrink:0;line-height:1;margin-top:1px; }
.activity-text { font-size:13px;flex:1;line-height:1.4; }
.activity-date { font-size:11px;color:var(--text-muted);flex-shrink:0;margin-top:2px; }

function renderTags(tags, size = 'normal') {
  if (!tags || tags.length === 0) return '';
  const show = size === 'compact' ? tags.slice(0, 2) : tags;
  return `<div class="mood-tags">${show.map(t => {

function renderManaSymbols(colorsStr, size = 16) {
  if (!colorsStr) return '';
  const ORDER = ['W', 'U', 'B', 'R', 'G', 'C'];
  const symbols = (colorsStr.toUpperCase().match(/[WUBRG]/g) || []);
  // Sort by WUBRG order, deduplicate
  const sorted = ORDER.filter(c => symbols.includes(c));
  if (sorted.length === 0) return '';
  return sorted.map(c =>
    `<img src="https://svgs.scryfall.io/card-symbols/${c}.svg" alt="${c}" title="${c}" style="width:${size}px;height:${size}px;vertical-align:middle;display:inline-block" loading="lazy">`

// Returns decks owned by the current user (UID-first, name fallback for legacy decks)
function getMyDecks() {
  const myUid = state.currentUser?.uid;
  const myName = currentUserName();
  return state.decks.filter(d => d.ownerUid ? d.ownerUid === myUid : d.player === myName);
}

// One-time migration: claims existing decks matching the current display name
async function claimMyDecks() {
  const myUid = state.currentUser?.uid;
  const myName = currentUserName();
  if (!myUid) return;
  const unclaimed = state.decks.filter(d => !d.ownerUid && d.player === myName);
  if (!unclaimed.length) { alert('All your decks are already claimed!'); return; }
  const batch = writeBatch(db);
  unclaimed.forEach(d => batch.update(doc(db, 'decks', d.id), { ownerUid: myUid }));
  await batch.commit();
  alert(`Claimed ${unclaimed.length} deck${unclaimed.length !== 1 ? 's' : ''} for ${myName} ✅`);
}

// Claim decks from a previous display name (after name change)
async function claimByOldName(oldName) {
  const myUid = state.currentUser?.uid;
  if (!myUid || !oldName) return;
  const unclaimed = state.decks.filter(d => !d.ownerUid && d.player === oldName);
  if (!unclaimed.length) { alert(`No unclaimed decks found for "${oldName}".`); return; }
  const batch = writeBatch(db);
  unclaimed.forEach(d => batch.update(doc(db, 'decks', d.id), { ownerUid: myUid }));
  await batch.commit();
  alert(`Claimed ${unclaimed.length} deck${unclaimed.length !== 1 ? 's' : ''} from "${oldName}" ✅`);
}

async function handleLogin() {
  const email = document.getElementById('login-email')?.value.trim();
  const password = document.getElementById('login-password')?.value;
  if (!email || !password) return;
  const btn = document.getElementById('login-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Signing in…'; }
  try {
    await signInWithEmailAndPassword(auth, email, password);
    state.loginError = '';
    // onAuthStateChanged will handle the rest
  } catch (e) {
    state.loginError = (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found')
      ? 'Invalid email or password' : e.message;
    renderLogin();
  }
}

async function handleSignOut() {

  state.decks = [];

  state.expanded = {};

let unsubscribeDecks = null;
let unsubscribeSession = null;
let unsubscribePlaytest = null;
let unsubscribePrivate = null;
let unsubscribeChat = null;
let unsubscribeSessions = null;
let chatLastReadTs = 0;

function setupFirestoreListener() {
  if (unsubscribeDecks) unsubscribeDecks();
  // Load player avatars in real-time
  onSnapshot(collection(db, 'users'), snap => {
    const avatars = {};
    snap.docs.forEach(d => { if (d.data().avatar) avatars[d.id] = d.data().avatar; });
    state.playerAvatars = avatars;
    render();
  });
  // Load current user's profile (displayName etc)
  const uid = state.currentUser?.uid;
  if (uid) {
    onSnapshot(doc(db, 'userProfiles', uid), snap => {
      state.userProfile = snap.exists() ? snap.data() : null;
      if (!state.userProfile?.displayName) state.showNameModal = true;
      render();
    });
  }
  // Real-time chat
  if (unsubscribeChat) unsubscribeChat();
  const chatQ = query(collection(db, 'messages'), orderBy('ts', 'asc'), limit(60));
  unsubscribeChat = onSnapshot(chatQ, snap => {
    state.chatMessages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (state.chatOpen) {
      renderChatMessages();
    } else {
      const myName = currentUserName();
      state.chatUnread = state.chatMessages.filter(m => (m.ts || 0) > chatLastReadTs && m.player !== myName).length;
      renderChatFAB();
    }
  }, () => {});

  unsubscribeDecks = onSnapshot(collection(db, 'decks'), snapshot => {
    state.decks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    state.loaded = true;
    render();
  }, err => {
    console.error('Firestore error:', err);
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:80px 20px">
        <p style="color:var(--tier-s-text);font-size:14px;margin-bottom:8px">Could not connect to Firestore</p>
        <p style="color:var(--text-muted);font-size:12px;max-width:400px;margin:0 auto">Make sure Firestore is enabled in the Firebase console (Build → Firestore Database → Create database) and set to test mode.</p>
        <p style="color:var(--text-muted);font-size:11px;margin-top:12px;font-family:monospace">${err.code || err.message}</p>
      </div>`;
  });

}

function getLeaderboardData() {
  const myUid = state.currentUser?.uid;
  // Group by ownerUid when available, fall back to player name for legacy decks
  const groups = new Map();
  state.decks.filter(d => d.player).forEach(d => {
    const key = d.ownerUid || `name:${d.player}`;
    if (!groups.has(key)) groups.set(key, { player: d.player, decks: [] });
    const g = groups.get(key);
    g.decks.push(d);
    g.player = d.player; // last-seen name wins
  });
  // Always show current display name for logged-in user's entry
  if (myUid && groups.has(myUid)) {
    groups.get(myUid).player = currentUserName() || groups.get(myUid).player;
  }
  return [...groups.values()].map(({ player, decks: pd }) => {
    const allGames = pd.flatMap(d => d.games || []).filter(g => !g.loaned);
    const wins = allGames.filter(g => g.result === 'win').length;
    const losses = allGames.filter(g => g.result === 'loss').length;
    const total = wins + losses;
    const winRate = total > 0 ? Math.round((wins / total) * 100) : null;
    const bestDeck = [...pd].sort((a, b) => getOverall(b) - getOverall(a))[0] || null;
    return { player, wins, losses, total, winRate, bestDeck, deckCount: pd.length };
  }).sort((a, b) => {
    if (a.winRate === null && b.winRate === null) return b.deckCount - a.deckCount;
    if (a.winRate === null) return 1;
    if (b.winRate === null) return -1;
    return b.winRate - a.winRate;
  }).slice(0, 10);
}

const REC_COLOR_NAMES = { W: 'White', U: 'Blue', B: 'Black', R: 'Red', G: 'Green' };
const REC_COLOR_BG    = { W: '#C8A84B', U: '#1070C8', B: '#4B4B4B', R: '#D0392A', G: '#1A7A3C' };

function getRecommendations() {
  if (!currentUserName()) return [];
  const myDecks = getMyDecks();
  const myUid = state.currentUser?.uid;
  const recs = [];
  const cutoff = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

  // 1. Dust-off: most-played deck not touched in 30 days
  const neglected = myDecks
    .map(d => {
      const games = d.games || [];
      if (games.length < 3) return null;
      const recent = games.filter(g => g.date >= cutoff);
      if (recent.length > 0) return null;
      return { deck: d, games: games.length };
    })
    .filter(Boolean)
    .sort((a, b) => b.games - a.games)[0];
  if (neglected) recs.push({ type: 'dust-off', deck: neglected.deck, games: neglected.games });

  // 2. Counter pick: your best deck vs the opponent you lose to most
  const lossCount = {};
  myDecks.forEach(d => {
    (d.games || []).forEach(g => {
      if (g.result === 'loss' && g.opponentId) lossCount[g.opponentId] = (lossCount[g.opponentId] || 0) + 1;
    });
  });
  const [worstOppId, worstLosses] = Object.entries(lossCount).sort((a, b) => b[1] - a[1])[0] || [];
  if (worstOppId && worstLosses >= 2) {
    const worstOpp = state.decks.find(d => d.id === worstOppId);
    if (worstOpp) {
      const counter = myDecks
        .map(d => {
          const vsGames = (d.games || []).filter(g => g.opponentId === worstOppId);
          if (!vsGames.length) return null;
          const wins = vsGames.filter(g => g.result === 'win').length;
          return { deck: d, wins, total: vsGames.length, wr: wins / vsGames.length };
        })
        .filter(Boolean)
        .sort((a, b) => b.wr - a.wr)[0];
      if (counter && counter.wr >= 0.4)
        recs.push({ type: 'counter', deck: counter.deck, opp: worstOpp, wins: counter.wins, total: counter.total, losses: worstLosses });
    }
  }

  // 3. Brew challenge: color missing from your collection but present in the pod
  const myColors = new Set(myDecks.flatMap(d => (d.colors || '').split('')).filter(c => 'WUBRG'.includes(c)));
  const podColorCount = {};
  state.decks.filter(d => myUid ? d.ownerUid !== myUid : d.player !== currentUserName()).forEach(d => {
    (d.colors || '').split('').forEach(c => { if ('WUBRG'.includes(c)) podColorCount[c] = (podColorCount[c] || 0) + 1; });
  });
  const missingWithPod = ['W','U','B','R','G']
    .filter(c => !myColors.has(c) && (podColorCount[c] || 0) >= 2)
    .sort((a, b) => (podColorCount[b] || 0) - (podColorCount[a] || 0));
  if (missingWithPod.length > 0)
    recs.push({ type: 'gap', color: missingWithPod[0], podCount: podColorCount[missingWithPod[0]] || 0 });

  return recs;
}

function renderRecommendations() {
  const recs = getRecommendations();
  if (!recs.length) return '';
  const cards = recs.map(r => {
    if (r.type === 'dust-off') {
      const tier = getTier(r.deck.power);
      return `<div class="rec-card" onclick="openDeckDetail('${r.deck.id}')">
        <div class="rec-icon">🧹</div>
        <div class="rec-body">
          <div class="rec-title">Dust it off</div>
          <div class="rec-desc">${escHtml(r.deck.commander)}</div>

      </div>`;
    }
    if (r.type === 'counter') {
      const losses = r.total - r.wins;
      return `<div class="rec-card" onclick="openDeckDetail('${r.deck.id}')">
        <div class="rec-icon">⚔️</div>
        <div class="rec-body">
          <div class="rec-title">Counter pick</div>
          <div class="rec-desc">${escHtml(r.deck.commander)} — ${r.wins}W-${losses}L vs ${escHtml(r.opp.commander)}</div>
          <div class="rec-meta">You've lost to ${escHtml(r.opp.commander)} ${r.losses}× — this matchup favours you</div>
        </div>
      </div>`;
    }
    if (r.type === 'gap') {
      const bg = REC_COLOR_BG[r.color];
      return `<div class="rec-card">
        <div class="rec-icon" style="background:${bg}22;border-color:${bg}55"><span style="color:${bg};font-weight:700;font-size:14px">${r.color}</span></div>
        <div class="rec-body">
          <div class="rec-title">Brew challenge</div>
          <div class="rec-desc">No ${REC_COLOR_NAMES[r.color]} decks in your collection</div>
          <div class="rec-meta">${r.podCount} ${REC_COLOR_NAMES[r.color]} deck${r.podCount !== 1 ? 's' : ''} in the pod — consider brewing one</div>
        </div>
      </div>`;
    }
    return '';
  }).join('');
  return `<div class="dash-section-title">Suggestions</div><div class="dash-card" style="overflow:hidden">${cards}</div>`;
}

function getRecentGames(limit = 10) {
  const games = [];
  state.decks.forEach(deck => {
    (deck.games || []).forEach(g => {
      if (g.result === 'win') {
        games.push({ date: g.date || '', ts: g.ts || 0, winnerDeck: deck, loserDeck: state.decks.find(d => d.id === g.opponentId) || null });
      }
    });
  });
  // Sort by real timestamp first (new games), then date string (fallback for old games)
  return games.sort((a, b) => (b.ts - a.ts) || b.date.localeCompare(a.date)).slice(0, limit);
}

  const COLOR_ALIASES = { white:'W', blue:'U', black:'B', red:'R', green:'G', azorius:'WU', dimir:'UB', rakdos:'BR', gruul:'RG', selesnya:'GW', orzhov:'WB', izzet:'UR', golgari:'BG', boros:'WR', simic:'UG', esper:'WUB', grixis:'UBR', jund:'BRG', naya:'RGW', bant:'GWU', abzan:'WBG', jeskai:'WUR', sultai:'UBG', mardu:'WBR', temur:'URG', wubrg:'WUBRG', colorless:'C' };
  let filtered = state.playerFilter === 'All' ? decks : decks.filter(d => d.player === state.playerFilter);
  if (state.tierFilter) filtered = filtered.filter(d => getTier(d.power) === state.tierFilter);

    </div>
    <div class="tier-bar-wrap">
      <div class="tier-bar">
        ${TIERS.map(t => {
          const count = decks.filter(d => getTier(d.power) === t.label).length;
          const isActive = state.tierFilter === t.label;

  } else if (state.view === 'tiers') {

async function loadDeckCardArts() {
  const artDivs = [...document.querySelectorAll('.deck-card-art[data-art-commander]')];
  const toFetch = artDivs.filter(el => el.getAttribute('data-art-commander'));
  if (toFetch.length === 0) return;

  for (const el of toFetch) {
    const commander = el.getAttribute('data-art-commander');
    if (!commander) continue;
    const key = commander.toLowerCase();
    let imgUrl = null;

    const existing = scryfallCache[key];
    if (typeof existing === 'string') {
      imgUrl = existing;
    } else if (existing?.imageUrl) {
      imgUrl = existing.imageUrlArtCrop || existing.imageUrl;
    } else {
      try {
        const searchName = commander.includes(' // ') ? commander.split(' // ')[0].trim() : commander;
        const resp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(searchName)}&format=json`);
        if (resp.ok) {
          const data = await resp.json();
          const iuris = data.image_uris || data.card_faces?.[0]?.image_uris;
          const imgNormal = iuris?.normal || iuris?.large || null;
          const imgArtCrop = iuris?.art_crop || imgNormal;
          imgUrl = imgNormal;
          const backIuris = data.card_faces?.[1]?.image_uris;
          const isDF = ['transform','modal_dfc','double_faced_token','reversible_card'].includes(data.layout);
          if (!(scryfallCache[key]?.imageUrlBack)) {
            scryfallCache[key] = imgNormal ? { imageUrl: imgNormal, imageUrlArtCrop: imgArtCrop, imageUrlBack: backIuris?.normal ?? null, isDoubleFaced: isDF, backFaceName: data.card_faces?.[1]?.name ?? null } : null;
          }
        }
      } catch(e) {}
      await new Promise(r => setTimeout(r, 80));
    }

    if (imgUrl && document.contains(el)) {
      el.style.backgroundImage = `url('${imgUrl}')`;
      el.removeAttribute('data-art-commander');
      el.classList.add('loaded');
    }
  }
}

function handleOpponentKey(e, deckId) {
  const list = document.getElementById('log-opp-list-' + deckId);
  if (!list || list.style.display === 'none') return;
  const items = list.querySelectorAll('.autocomplete-item');
  const active = list.querySelector('.autocomplete-item.active');
  let idx = Array.from(items).indexOf(active);
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); }
  else if (e.key === 'Enter' && active) { e.preventDefault(); active.dispatchEvent(new MouseEvent('mousedown')); return; }
  else if (e.key === 'Escape') { list.style.display = 'none'; return; }
  else return;
  items.forEach(i => i.classList.remove('active'));
  if (items[idx]) items[idx].classList.add('active');
}

function submitGame(deckId, result) {
  const hidden = document.getElementById('log-opp-' + deckId);
  if (!hidden || !hidden.value) {
    const ti = document.getElementById('log-opp-input-' + deckId);
    if (ti) ti.focus();
    return;
  }
  const opponentId = hidden.value;
  const date = new Date().toISOString().split('T')[0];
  const oppositeResult = result === 'win' ? 'loss' : 'win';

  // Optimistic local update
  state.decks = state.decks.map(d => {
    if (d.id === deckId) return { ...d, games: [...(d.games || []), { opponentId, result, date }] };
    if (d.id === opponentId) return { ...d, games: [...(d.games || []), { opponentId: deckId, result: oppositeResult, date }] };
    return d;
  });
  state.loggingGame = null;
  state.logForm = { query: '', opponentId: '' };
  render();

  // Firestore batch write
  const deck1 = state.decks.find(d => d.id === deckId);
  const deck2 = state.decks.find(d => d.id === opponentId);
  const batch = writeBatch(db);
  if (deck1) { const { id, ...data } = deck1; batch.set(doc(db, 'decks', id), data); }
  if (deck2) { const { id, ...data } = deck2; batch.set(doc(db, 'decks', id), data); }
  batch.commit().catch(console.error);
}

function removeGame(deckId, gameIndex) {
  const deck = state.decks.find(d => d.id === deckId);
  if (!deck || !deck.games?.[gameIndex]) return;
  const game = deck.games[gameIndex];
  const opponentId = game.opponentId;

  state.decks = state.decks.map(d => {
    if (d.id === deckId) return { ...d, games: d.games.filter((_, i) => i !== gameIndex) };
    if (d.id === opponentId) {
      const mirrorIdx = (d.games || []).findIndex(g => g.opponentId === deckId && g.date === game.date);
      if (mirrorIdx >= 0) return { ...d, games: d.games.filter((_, i) => i !== mirrorIdx) };
    }
    return d;
  });
  render();

  const updated1 = state.decks.find(d => d.id === deckId);
  const updated2 = state.decks.find(d => d.id === opponentId);
  const batch = writeBatch(db);
  if (updated1) { const { id, ...data } = updated1; batch.set(doc(db, 'decks', id), data); }
  if (updated2) { const { id, ...data } = updated2; batch.set(doc(db, 'decks', id), data); }
  batch.commit().catch(console.error);
}

function saveDecklistText(text) {
  const id = state.decklistView;
  const updates = { decklist: text };
  // Auto-detect commander from Moxfield copy-paste format
  // Priority: card right after "// Commander" section header
  // Fallback: first card line with (SET) COLLNUM suffix
  const isMoxfieldPaste = /\d+\s+.+\([A-Z0-9]{2,7}\)\s+\S/.test(text);
  if (isMoxfieldPaste) {
    const lines = text.split('\n').map(l => l.trim());
    let inCmdSection = false;
    let cmdName = null;
    for (const rawLine of lines) {
      if (rawLine.toLowerCase().startsWith('// commander') || rawLine.toLowerCase() === 'commander:') {
        inCmdSection = true; continue;
      }
      if (rawLine.startsWith('//') || rawLine.startsWith('#')) { inCmdSection = false; continue; }
      const card = parseCardLine(rawLine);
      if (card && inCmdSection) { cmdName = card.name; break; }
      // Fallback: first card with set code if no commander section found
      if (card && !cmdName && !inCmdSection) cmdName = card.name;
    }
    if (cmdName) {
      updates.commander = cmdName;
      // Also auto-name the deck if it has no name or a generic one
      const deck = state.decks.find(d => d.id === id);
      if (deck && (!deck.name || deck.name === 'New Deck' || deck.name === cmdName)) {
        updates.name = cmdName;
      }
    }
  }
  updates.decklistUpdatedAt = Date.now();
  state.decks = state.decks.map(d => d.id === id ? { ...d, ...updates } : d);
  fbUpdateDeck(id, updates).catch(console.error);
}

function parseCardLine(line) {
  if (!line || line.startsWith('//') || line.startsWith('#')) return null;
  // Moxfield / MTGA format: QTY CARDNAME (SET) COLLNUM [optional foil markers]
  // Collector number: alphanumeric + dash (strips ★ *F* etc.)
  const mFull = line.match(/^(\d+)x?\s+(.+?)\s+\(([A-Z0-9]{2,7})\)\s+([A-Za-z0-9*-]+)/);
  if (mFull) return { qty: parseInt(mFull[1], 10), name: mFull[2].trim(), set: mFull[3].toLowerCase(), collectorNumber: mFull[4] };
  // Basic format: QTY CARDNAME
  const m = line.match(/^(\d+)x?\s+(.+?)\s*$/);
  if (m) return { qty: parseInt(m[1], 10), name: m[2].trim() };
  return null;
}

function parseDecklist(text) {
  const sections = parseDecklistSections(text);
  return [...sections.main, ...sections.sideboard, ...sections.maybeboard];
}

function parseDecklistSections(text) {
  const sections = { main: [], sideboard: [], maybeboard: [] };
  let current = 'main';
  let mainHasCards = false, sideHasCards = false, blankAfterMain = false;

  for (const rawLine of (text || '').split('\n')) {
    const line = rawLine.trim();
    if (!line) {
      // MTGO blank-line section switching
      if (mainHasCards && current === 'main') { blankAfterMain = true; current = 'sideboard'; }
      else if (sideHasCards && current === 'sideboard') current = 'maybeboard';
      continue;
    }
    if (line.startsWith('#')) continue;

    // Explicit section headers (Archidekt, Moxfield, MTGA formats)
    if (/^\/\/\s*(sideboard|sb)\b/i.test(line) || /^sideboard\s*:?\s*$/i.test(line)) { current = 'sideboard'; continue; }
    if (/^\/\/\s*(maybeboard|maybe)\b/i.test(line) || /^maybeboard\s*:?\s*$/i.test(line)) { current = 'maybeboard'; continue; }
    if (/^\/\/\s*(mainboard|deck|main|commander)\b/i.test(line) || /^(mainboard|deck|main|commander)\s*:?\s*$/i.test(line)) {
      // If blank-line switch happened but we see a "Deck" header, correct it back
      if (blankAfterMain && current === 'sideboard' && !sideHasCards) current = 'main';
      else current = 'main';
      continue;
    }
    if (line.startsWith('//')) continue;

    // "SB: 1 Card Name" prefix
    let parseLine = line, target = current;
    if (/^SB:\s*/i.test(line)) { parseLine = line.replace(/^SB:\s*/i, ''); target = 'sideboard'; }

    const card = parseCardLine(parseLine);
    if (!card) continue;
    sections[target].push(card);
    if (target === 'main') mainHasCards = true;
    if (target === 'sideboard') sideHasCards = true;
  }
  return sections;
}

const TYPE_ORDER = ["Commander", "Planeswalker", "Creature", "Instant", "Sorcery", "Artifact", "Enchantment", "Land", "Token", "Other"];

function getCardGroup(name, typeLine, commanderName) {
  if (name === commanderName) return "Commander";
  if (!typeLine) return "Other";
  if (typeLine.startsWith("Token") || typeLine.startsWith("Legendary Token") || typeLine.includes("// Token")) return "Token";
  if (typeLine.includes("Planeswalker")) return "Planeswalker";
  if (typeLine.includes("Creature")) return "Creature";
  if (typeLine.includes("Instant")) return "Instant";
  if (typeLine.includes("Sorcery")) return "Sorcery";
  if (typeLine.includes("Artifact")) return "Artifact";
  if (typeLine.includes("Enchantment")) return "Enchantment";
  if (typeLine.includes("Land")) return "Land";
  return "Other";
}

function groupCardsByType(cards, commanderName) {
  const groups = {};
  TYPE_ORDER.forEach(t => groups[t] = []);
  cards.forEach(c => {
    const cached = scryfallCache[scryfallKey(c.name)];
    const typeLine = cached ? cached.typeLine : null;
    const group = getCardGroup(c.name, typeLine, commanderName);
    groups[group].push(c);
  });
  return groups;
}

function renderTypeGroupText(cards, commanderName) {
  const groups = groupCardsByType(cards, commanderName);

    const total = group.reduce((s, c) => s + c.qty, 0);

    html += `<div class="dl-group">
      <div class="dl-group-header">${typeLabel} <span class="dl-group-count">(${total})</span></div>
      <div class="dl-group-entries">`;
    group.forEach(c => {
      const cached = scryfallCache[scryfallKey(c.name)];
